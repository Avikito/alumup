<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | פאנל ניהול הזמנות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    .admin-wrapper { display: flex; flex: 1; min-height: calc(100vh - 64px); }

    .admin-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface-dark);
      border-left: 1px solid var(--border);
      padding: 1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }
    .nav-badge { margin-right:auto;background:#dc2626;color:#fff;font-size:0.62rem;font-weight:800;padding:0.1rem 0.42rem;border-radius:20px;line-height:1.5;display:none; }
    .nav-badge.show { display:inline-block; }
    /* ── ACCORDION NAV GROUPS ── */
    .nav-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:0.55rem 0.75rem;border-radius:8px;font-size:0.88rem;font-weight:600;color:var(--silver-dark);cursor:pointer;transition:all 0.18s ease;user-select:none; }
    .nav-group-hdr:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .nav-group-hdr.open { color:var(--electric-blue); }
    .nav-grp-left { display:flex;align-items:center;gap:0.65rem; }
    .nav-caret { font-size:0.72rem;transition:transform 0.22s ease; }
    .nav-group-hdr.open .nav-caret { transform:rotate(180deg); }
    .nav-sub { list-style:none;flex-direction:column;gap:0.08rem;padding:0.1rem 0 0.1rem 0.9rem;margin:0; }
    .nav-sub a { font-size:0.84rem !important;padding:0.42rem 0.75rem !important; }
    .row-unread td:first-child { border-right:3px solid var(--electric-blue); }
    .row-unread { background:rgba(0,102,255,0.04); }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:1.5rem; }

    /* ── FILTERS ── */
    .filter-bar { display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap; }
    .filter-btn {
      padding:0.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);
      background:var(--surface-dark);font-size:0.82rem;font-weight:600;
      color:var(--silver-dark);cursor:pointer;transition:all 0.18s ease;
      font-family:'Heebo',sans-serif;
    }
    .filter-btn:hover { border-color:var(--electric-blue);color:var(--electric-blue); }
    .filter-btn.active { border-color:var(--electric-blue);background:var(--blue-dim);color:var(--electric-blue); }
    .search-input {
      padding:0.4rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;
      font-family:'Heebo',sans-serif;font-size:0.88rem;color:var(--industrial-silver);
      background:var(--surface-dark);min-width:220px;
    }
    .search-input:focus { outline:none;border-color:var(--electric-blue); }

    /* ── TABLE ── */
    .orders-table-wrap { overflow-x:auto;border-radius:12px;border:1px solid var(--border); }
    .orders-table { width:100%;border-collapse:collapse;font-size:0.88rem; }
    .orders-table th {
      background:var(--surface-elevated,#f7f9fd);padding:0.75rem 1rem;
      text-align:right;font-size:0.75rem;font-weight:700;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);
    }
    .orders-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .orders-table tr:last-child td { border-bottom:none; }
    .orders-table tr:hover td { background:var(--blue-dim); }

    .status-badge {
      display:inline-flex;align-items:center;gap:0.3rem;padding:0.22rem 0.65rem;
      border-radius:20px;font-size:0.75rem;font-weight:700;white-space:nowrap;
    }
    .status-draft      { background:rgba(196,124,0,0.1);  color:#a06000;border:1px solid rgba(196,124,0,0.25); }
    .status-review     { background:rgba(234,88,12,0.12); color:#ea580c;border:1px solid rgba(234,88,12,0.3); font-weight:800; }
    .status-production { background:rgba(26,95,170,0.1);  color:var(--electric-blue);border:1px solid rgba(26,95,170,0.25); }
    .status-delivered  { background:rgba(22,163,74,0.1);  color:#16a34a;border:1px solid rgba(22,163,74,0.25); }
    .status-dispute    { background:rgba(234,88,12,0.13); color:#c2410c;border:1px solid rgba(234,88,12,0.35); font-weight:800; }
    .status-cancelled  { background:rgba(100,116,139,0.1);color:#64748b;border:1px solid rgba(100,116,139,0.25); }

    /* orange row highlight for dispute */
    .orders-table tr.row-dispute td { background:rgba(234,88,12,0.05); }
    .orders-table tr.row-dispute:hover td { background:rgba(234,88,12,0.1); }

    /* ── STATUS ROW COLORS ── */
    .orders-table tr.row-s-pending td              { background:#FFF4E5; color:#663C00; }
    .orders-table tr.row-s-pending td:first-child  { border-right:3px solid #FFB74D; }
    .orders-table tr.row-s-pending:hover td        { background:#FFE0B2; }

    .orders-table tr.row-s-technical_review td             { background:#F3E5F5; color:#4A148C; }
    .orders-table tr.row-s-technical_review td:first-child { border-right:3px solid #CE93D8; }
    .orders-table tr.row-s-technical_review:hover td       { background:#E1BEE7; }

    .orders-table tr.row-s-in_production td             { background:#E3F2FD; color:#0D47A1; }
    .orders-table tr.row-s-in_production td:first-child { border-right:3px solid #64B5F6; }
    .orders-table tr.row-s-in_production:hover td       { background:#BBDEFB; }

    .orders-table tr.row-s-ready_for_delivery td             { background:#C8E6C9; color:#1B5E20; }
    .orders-table tr.row-s-ready_for_delivery td:first-child { border-right:3px solid #81C784; }
    .orders-table tr.row-s-ready_for_delivery:hover td       { background:#A5D6A7; }

    .orders-table tr.row-s-delivered td             { background:#ECEFF1; color:#455A64; }
    .orders-table tr.row-s-delivered td:first-child { border-right:3px solid #B0BEC5; }
    .orders-table tr.row-s-delivered:hover td       { background:#CFD8DC; }

    .orders-table tr.row-s-cancelled td             { background:#FFEBEE; color:#B71C1C; }
    .orders-table tr.row-s-cancelled td:first-child { border-right:3px solid #EF5350; }
    .orders-table tr.row-s-cancelled:hover td       { background:#FFCDD2; }

    .orders-table tr.row-s-dispute td             { background:#FFE0B2; color:#E65100; }
    .orders-table tr.row-s-dispute td:first-child { border-right:3px solid #FF6D00; }
    .orders-table tr.row-s-dispute:hover td       { background:#FFCC80; }

    .btn-approve-production {
      display:flex;align-items:center;justify-content:center;gap:0.5rem;
      width:100%;padding:0.85rem;margin-top:1.25rem;
      background:#ea580c;color:#fff;border:none;border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:0.95rem;font-weight:700;
      cursor:pointer;transition:background 0.18s ease,transform 0.15s ease;
    }
    .btn-approve-production:hover { background:#c2410c;transform:translateY(-1px); }
    .btn-approve-production:disabled { opacity:0.5;pointer-events:none; }

    .status-select {
      padding:0.3rem 0.65rem;border:1.5px solid var(--border);border-radius:7px;
      font-family:'Heebo',sans-serif;font-size:0.82rem;color:var(--industrial-silver);
      background:var(--surface-dark);cursor:pointer;transition:border-color 0.18s;
    }
    .status-select:focus { outline:none;border-color:var(--electric-blue); }
    .status-select.saving { opacity:0.5;pointer-events:none; }

    .order-code-cell { font-weight:700;color:var(--electric-blue);font-size:0.82rem; }
    .price-cell { font-weight:700; }
    .systems-cell { color:var(--silver-dark); }

    .empty-state { text-align:center;padding:3rem;color:var(--silver-dark); }
    .empty-state i { font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.3; }

    .orders-count { font-size:0.82rem;color:var(--silver-dark);margin-bottom:0.75rem; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite;display:inline-block; }

    .save-indicator {
      font-size:0.75rem;color:var(--silver-dark);margin-top:0.2rem;height:14px;
    }
    .save-ok { color:#16a34a; }
    .save-err { color:#dc2626; }

    /* ── DETAIL PANEL (slide-in from right) ── */
    .detail-panel-overlay {
      position:fixed;inset:0;background:rgba(10,20,40,0.35);
      z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s ease;
    }
    .detail-panel-overlay.open { opacity:1;pointer-events:all; }
    .detail-panel {
      position:fixed;top:0;left:0;height:100%;width:100%;max-width:500px;
      background:var(--surface-dark);box-shadow:-8px 0 40px rgba(10,20,60,0.15);
      overflow-y:auto;transform:translateX(-100%);transition:transform 0.25s ease;
      padding:1.5rem;
    }
    .detail-panel-overlay.open .detail-panel { transform:translateX(0); }
    .detail-hdr { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem; }
    .detail-title { font-size:1rem;font-weight:800;color:var(--industrial-silver); }
    .btn-close-panel { background:none;border:none;cursor:pointer;font-size:1.25rem;color:var(--silver-dark); }

    .detail-sys-card { background:var(--surface-elevated,#f7f9fd);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem; }
    .detail-sys-title { font-size:0.82rem;font-weight:700;color:var(--electric-blue);margin-bottom:0.5rem; }
    .detail-grid { display:grid;grid-template-columns:1fr 1fr;gap:0.35rem 1rem; }
    .detail-item { display:flex;flex-direction:column; }
    .detail-key { font-size:0.7rem;color:var(--silver-dark); }
    .detail-val { font-size:0.85rem;font-weight:600;color:var(--industrial-silver); }
    .detail-totals { border-top:1px solid var(--border);padding-top:0.75rem;margin-top:0.75rem; }
    .detail-total-row { display:flex;justify-content:space-between;font-size:0.85rem;padding:0.25rem 0; }
    .detail-total-row.grand { font-weight:800;color:var(--electric-blue);font-size:0.95rem;border-top:1px solid var(--border);padding-top:0.4rem;margin-top:0.2rem; }

    .barcode-container { text-align:center;margin:1rem 0;background:var(--surface-elevated,#f7f9fd);border:1px solid var(--border);border-radius:10px;padding:1rem; }
    .barcode-container svg { max-width:100%; }
    .btn-pdf {
      display:flex;align-items:center;justify-content:center;gap:0.5rem;
      width:100%;padding:0.75rem;margin-top:0.75rem;
      background:var(--surface-dark);color:var(--electric-blue);
      border:1.5px solid var(--electric-blue);border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:0.9rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;
    }
    .btn-pdf:hover { background:var(--blue-dim); }
    .btn-pdf:disabled { opacity:0.5;pointer-events:none; }

    /* ── AUDIT LOG ── */
    .audit-log-section { margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem; }
    .audit-log-title { font-size:0.75rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem; }
    .audit-entry { display:flex;align-items:flex-start;gap:0.65rem;padding:0.5rem 0;border-bottom:1px dashed var(--border); }
    .audit-entry:last-child { border-bottom:none; }
    .audit-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px; }
    .audit-dot-edit   { background:#0891b2; }
    .audit-dot-status { background:#1a5faa; }
    .audit-dot-delete { background:#dc2626; }
    .audit-meta { font-size:0.78rem;line-height:1.5; }
    .audit-who { font-weight:700;color:var(--industrial-silver); }
    .audit-what { color:var(--silver-dark); }
    .audit-time { font-size:0.72rem;color:#94a3b8;margin-top:0.1rem; }
    .audit-change { display:inline-flex;align-items:center;gap:0.3rem;margin-top:0.15rem; }
    .audit-before { background:#fef2f2;color:#b91c1c;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.73rem;font-weight:600; }
    .audit-arrow  { color:#94a3b8;font-size:0.7rem; }
    .audit-after  { background:#f0fdf4;color:#15803d;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.73rem;font-weight:600; }
    .audit-empty  { font-size:0.8rem;color:#94a3b8;text-align:center;padding:0.5rem 0; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div class="page-title">ניהול הזמנות</div>
      <div class="page-subtitle" id="adminSubtitle">טוען...</div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all')">הכל</button>
        <button class="filter-btn" onclick="setFilter('pending')">ממתין לאישור</button>
        <button class="filter-btn" onclick="setFilter('technical_review')">בבדיקה טכנית</button>
        <button class="filter-btn" onclick="setFilter('in_production')">בתהליך ייצור</button>
        <button class="filter-btn" onclick="setFilter('ready_for_delivery')">מוכן למסירה</button>
        <button class="filter-btn" onclick="setFilter('delivered')">נמסר</button>
        <button class="filter-btn" onclick="setFilter('cancelled')">בוטל</button>
        <button class="filter-btn" onclick="setFilter('dispute')">מחלוקת</button>
        <input class="search-input" type="text" placeholder="חיפוש קוד / שם רוכש..." id="searchInput" oninput="renderTable()">
        <select class="search-input" id="typeFilter" onchange="renderTable()" style="min-width:140px;">
          <option value="">כל הסוגים</option>
          <option value="פרגולה">פרגולה</option>
          <option value="חלונות">חלונות</option>
          <option value="גדרות">גדרות</option>
        </select>
      </div>

      <div class="orders-count" id="ordersCount"></div>
      <div class="orders-table-wrap">
        <table class="orders-table">
          <thead>
            <tr>
              <th>קוד הזמנה</th>
              <th>הרוכש</th>
              <th>סוג מוצר</th>
              <th>תת מוצר</th>
              <th>מחיר</th>
              <th>כניסה</th>
              <th>עדכון אחרון</th>
              <th>סטטוס</th>
              <th>פרטים</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--silver-dark);">
              <i class="ph ph-circle-notch spin"></i> טוען הזמנות...
            </td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-panel" onclick="event.stopPropagation()">
      <div class="detail-hdr">
        <div class="detail-title" id="detailTitle">פירוט הזמנה</div>
        <button class="btn-close-panel" onclick="closeDetail()"><i class="ph ph-x"></i></button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://exfdjelwyrspfspcevvm.supabase.co',
  'sb_publishable_6Yb2QjjK9jkDpvAeIZuOxA_g1KEA4ED'
);

// ── SIDEBAR ──
(function() {
  const ACTIVE = 'orders';
  const groups = [
    { single:true, id:'overview', icon:'ph-squares-four', label:'מבט על', href:'admin-overview.html' },
    { id:'users-g', icon:'ph-users-three', label:'משתמשים', items:[
      { id:'users',   icon:'ph-users',       label:'אישור משתמשים', href:'admin-users.html' },
      { id:'members', icon:'ph-medal',        label:'חבר אלום',      href:'admin-members.html' },
      { id:'crm',     icon:'ph-address-book', label:'קהילה ו-CRM',  href:'approved-users.html' },
    ]},
    { id:'sales-g', icon:'ph-chart-line-up', label:'מכירות וכספים', items:[
      { id:'orders',    icon:'ph-list-bullets',           label:'הזמנות',        href:'admin.html' },
      { id:'quotes',    icon:'ph-file-text',              label:'הצעות מחיר',    href:'admin-quotes.html' },
      { id:'financial', icon:'ph-currency-circle-dollar', label:'ניהול פיננסי',  href:'admin-financial.html' },
      { id:'settings',  icon:'ph-gear-six',               label:'תמחור גלובלי', href:'admin-settings.html' },
    ]},
    { id:'ops-g', icon:'ph-wrench', label:'תפעול ולו"ז', items:[
      { id:'calendar', icon:'ph-calendar-dots', label:'לוח זמנים',    href:'admin-calendar.html' },
      { id:'tasks',    icon:'ph-check-square',  label:'ניהול משימות',    href:'admin-tasks.html' },
      { id:'monitor',  icon:'ph-monitor',       label:'מוניטור אדמינים', href:'admin-monitor.html' },
    ]},
  ];
  const activeGroup = groups.find(g => !g.single && g.items && g.items.some(i => i.id === ACTIVE));
  let html = '<div class="sidebar-label">ניהול</div><ul class="admin-nav">';
  for (const g of groups) {
    if (g.single) {
      html += `<li><a href="${g.href}" class="${g.id===ACTIVE?'active':''}"><i class="ph ${g.icon}"></i> ${g.label}</a></li>`;
    } else {
      const open = !!(activeGroup && activeGroup.id === g.id);
      html += `<li><div class="nav-group-hdr${open?' open':''}" onclick="(function(h){var s=h.nextElementSibling,o=h.classList.contains('open');document.querySelectorAll('.nav-group-hdr.open').forEach(function(x){x.classList.remove('open');x.nextElementSibling.style.display='none';});if(!o){h.classList.add('open');s.style.display='flex';}})(this)"><span class="nav-grp-left"><i class="ph ${g.icon}"></i> ${g.label}</span><i class="ph ph-caret-down nav-caret"></i></div><ul class="nav-sub" style="display:${open?'flex':'none'}">${g.items.map(i=>`<li><a href="${i.href}" class="${i.id===ACTIVE?'active':''}"><i class="ph ${i.icon}"></i> ${i.label}${i.id==='orders'?'<span class="nav-badge" id="orders-badge"></span>':''}</a></li>`).join('')}</ul></li>`;
    }
  }
  html += '</ul>';
  const el = document.getElementById('admin-sidebar-placeholder');
  if (el) el.innerHTML = html;
})();


let allOrders = [];
let currentFilter = 'all';
let statusFlow = {}; // { status_key: step_order } — loaded from DB
const FALLBACK_STEPS = {
  quote: 1, draft: 2, pending: 3,
  technical_review: 4, in_production: 5,
  ready_for_delivery: 6, delivered: 7,
  cancelled: 99, dispute: 100
};
const SPECIAL_STATUSES = ['cancelled', 'dispute'];
const ADMIN_PWD = 'ALUM2026';

function updateUnreadBadge() {
  const unread = allOrders.filter(o => o.is_read === false).length;
  const badge = document.getElementById('orders-badge');
  if (!badge) return;
  badge.textContent = unread || '';

/* ── RENDER TABLE ── */
function renderTable() {
  const search   = (document.getElementById('searchInput').value || '').toLowerCase();
  const typeVal  = (document.getElementById('typeFilter')?.value || '').toLowerCase();
  const QUOTE_STATUSES = ['quote', 'draft'];
  let rows = allOrders.filter(o => {
    // always exclude quotes/drafts — they live in admin-quotes.html
    if (QUOTE_STATUSES.includes(o.status)) return false;
    // specific tab: show only matching status
    if (currentFilter !== 'all' && o.status !== currentFilter) return false;
    // search filter
    if (search && !o.id.toLowerCase().includes(search) && !(o.customer_name||o.vendor_name||'').toLowerCase().includes(search) && !(o.order_code||'').toLowerCase().includes(search)) return false;
    // category/type filter
    if (typeVal && !(o.category||'').toLowerCase().includes(typeVal)) return false;
    return true;
  });

  document.getElementById('ordersCount').textContent = `מציג ${rows.length} מתוך ${allOrders.length} הזמנות`;

  const tbody = document.getElementById('ordersTableBody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><i class="ph ph-inbox"></i><p>אין הזמנות</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(o => {
    const fmtDT = iso => {
      if (!iso) return '—';
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    };
    const date = fmtDT(o.created_at);
    const lastUpdate = fmtDT(o.status_updated_at);
    const statusClass = { quote:'status-draft', draft:'status-draft', pending:'status-review', technical_review:'status-review', in_production:'status-production', ready_for_delivery:'status-production', delivered:'status-delivered', cancelled:'status-cancelled' }[o.status] || '';
    const statusLabel = { quote:'הצעת מחיר', draft:'טיוטה', pending:'ממתין לאישור', technical_review:'בבדיקה טכנית', in_production:'בתהליך ייצור', ready_for_delivery:'מוכן למסירה', delivered:'נמסר', cancelled:'בוטל' }[o.status] || o.status;
    const rowClass = [
      o.status ? `row-s-${o.status}` : '',
      o.status === 'dispute' ? 'row-dispute' : '',
      o.is_read === false ? 'row-unread' : ''
    ].filter(Boolean).join(' ');
    const priceVal = o.subtotal || o.total_price || 0;
    const price = priceVal > 0 ? `₪${Number(priceVal).toLocaleString()}` : `₪0`;

    return `<tr class="${rowClass}">
      <td class="order-code-cell">${getCode(o)}</td>
      <td><div style="font-weight:600">${o.customer_name || o.vendor_name || '—'}</div></td>
      <td>${getProductType(o)}</td>
      <td>${getSubProduct(o)}</td>
      <td style="font-weight:700;color:var(--electric-blue)">${price}</td>
      <td>${date}</td>
      <td style="color:var(--silver-dark);font-size:0.82rem;">${lastUpdate}</td>
      <td>
        <div>
          <select class="status-select" data-id="${o.id}" data-prev="${o.status}" onchange="updateStatus(this)">
            <option value="quote"               ${o.status==='quote'               ?'selected':''}>הצעת מחיר</option>
            <option value="draft"               ${o.status==='draft'               ?'selected':''}>טיוטה</option>
            <option value="pending"             ${o.status==='pending'             ?'selected':''}>ממתין לאישור</option>
            <option value="technical_review"    ${o.status==='technical_review'    ?'selected':''}>בבדיקה טכנית</option>
            <option value="in_production"       ${o.status==='in_production'       ?'selected':''}>בתהליך ייצור</option>
            <option value="ready_for_delivery"  ${o.status==='ready_for_delivery'  ?'selected':''}>מוכן למסירה</option>
            <option value="delivered"           ${o.status==='delivered'           ?'selected':''}>נמסר</option>
            <option value="cancelled"           ${o.status==='cancelled'           ?'selected':''}>בוטל</option>
            <option value="dispute"             ${o.status==='dispute'             ?'selected':''}>מחלוקת</option>
          </select>
          <div class="save-indicator" id="si-${o.id}"></div>
        </div>
      </td>
      <td>
        <button class="filter-btn" style="padding:0.3rem 0.7rem;font-size:0.78rem;" onclick="openDetail('${o.id}')">
          <i class="ph ph-eye"></i> פרטים

    </tr>`;
  }).join('');
}

/* ── UPDATE STATUS ── */
window.updateStatus = async function(sel) {
  const id         = sel.dataset.id;
  const newStatus  = sel.value;
  const prevStatus = sel.dataset.prev;
  const si         = document.getElementById(`si-${id}`);

  const prevStep = statusFlow[prevStatus] ?? FALLBACK_STEPS[prevStatus] ?? 0;
  const newStep  = statusFlow[newStatus]  ?? FALLBACK_STEPS[newStatus]  ?? 0;

  const isEnteringSpecial = SPECIAL_STATUSES.includes(newStatus);
  const isExitingSpecial  = SPECIAL_STATUSES.includes(prevStatus);
  const isForward         = newStep === prevStep + 1;

  /* Determine if password is needed */
  let needsPassword = false;
  if (isEnteringSpecial || isExitingSpecial) {
    needsPassword = true; // entering or exiting cancelled/dispute always needs password
  } else if (!isForward) {
    needsPassword = true; // backward or skipping steps
  }

  if (needsPassword) {
    const reason = isExitingSpecial
      ? `יציאה מסטטוס "${prevStatus === 'cancelled' ? 'בוטל' : 'מחלוקת'}" מצריכה אישור.`
      : isEnteringSpecial
      ? 'ביטול / מחלוקת מצריכים אישור מנהל.'
      : 'שינוי שלב שאינו רצוף מצריך אישור מנהל.';
    const pwd = window.prompt(`${reason}\nהכנס סיסמה:`);
    if (pwd !== ADMIN_PWD) {
      sel.value = prevStatus;
      si.innerHTML = '<span class="save-err"><i class="ph ph-lock"></i> סיסמה שגויה</span>';
      setTimeout(() => { if (si) si.innerHTML = ''; }, 2500);
      return;
    }
  }

  sel.classList.add('saving');
  si.innerHTML = '<i class="ph ph-circle-notch spin"></i>';

  const now = new Date().toISOString();
  const { error, count } = await supabase.from('orders')
    .update({ status: newStatus, status_updated_at: now }, { count: 'exact' })
    .eq('id', id);

  sel.classList.remove('saving');
  if (error || !count) {
    sel.value = prevStatus; // revert — DB didn't save
    const msg = error ? error.message : 'שינוי לא נשמר — בדוק הרשאות ב-Supabase';
    si.innerHTML = `<span class="save-err"><i class="ph ph-warning"></i> ${msg}</span>`;
    setTimeout(() => { if (si) si.innerHTML = ''; }, 4000);
  } else {
    const o = allOrders.find(x => x.id === id);
    if (o) { o.status = newStatus; o.status_updated_at = now; }
    sel.dataset.prev = newStatus;
    logOrderAction(id, 'status_change', { status: prevStatus }, { status: newStatus });
    renderTable();
    const siAfter = document.getElementById(`si-${id}`);
    if (siAfter) {
      siAfter.innerHTML = '<span class="save-ok"><i class="ph ph-check"></i> נשמר</span>';
      setTimeout(() => { if (siAfter) siAfter.innerHTML = ''; }, 2000);
    }
  }
};

    // ── הדמיות SVG ──
    if (o.config?.svgPreviews?.length > 0) {
      html += `<div style="margin-top:1rem;">
        <div style="font-size:0.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.6rem;">הדמיות טכניות</div>`;
      o.config.svgPreviews.forEach((p, i) => {
        html += `<div style="margin-bottom:0.75rem;">
          <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.3rem;font-weight:600;">מערכת ${i + 1}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
            <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">${p.isometric || ''}</div>
            <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">${p.technical || ''}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

  // ── חלונות ויטרינה ──
  } else if (o.config && Array.isArray(o.config.windows) && o.config.windows.length > 0) {
    const cfg = o.config;
    const glassMap = { triplex:'טריפלקס 3+3', milky:'חלבית/אנטי-סאן', insulating:'בידודית 4-12-4' };
    const openMap  = { sliding:'הזזה', casement:'ציר', tilt:'קיפ', fixed:'קבוע', fold:'קיפול', 'door-single':'דלת יחידה', 'door-double':'דלת כפולה', 'door-side':'דלת+קבוע' };

    if (cfg.projectName || cfg.customerName || cfg.customerAddress) {
      html += `<div style="margin-bottom:1rem;padding:0.75rem;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">`;
      if (cfg.projectName)     html += `<div style="font-size:0.82rem;margin-bottom:0.2rem;"><span style="color:#888;font-weight:600;">שם פרויקט: </span><strong>${cfg.projectName}</strong></div>`;
      if (cfg.customerName)    html += `<div style="font-size:0.82rem;margin-bottom:0.2rem;"><span style="color:#888;font-weight:600;">לקוח: </span><strong>${cfg.customerName}</strong></div>`;
      if (cfg.customerAddress) html += `<div style="font-size:0.82rem;"><span style="color:#888;font-weight:600;">כתובת: </span>${cfg.customerAddress}</div>`;
      html += `</div>`;
    }

    html += `<div style="font-size:0.78rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.5rem;">פירוט חלונות</div>`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:0.81rem;">
      <thead><tr style="background:#f0f4f8;text-align:right;">
        <th style="padding:5px 8px;">מיקום</th>
        <th style="padding:5px 8px;">סדרה</th>
        <th style="padding:5px 8px;">מידות (ס"מ)</th>
        <th style="padding:5px 8px;">פתיחה</th>
        <th style="padding:5px 8px;">זכוכית</th>
        <th style="padding:5px 8px;">תוספות</th>
      </tr></thead><tbody>` +
    cfg.windows.map((w, i) => {
      const count  = Math.max(1, parseInt(w.sectionCount)||1);
      const unitW  = w.width / count;
      const dims   = count > 1 ? `${count}×${Math.round(unitW)}×${w.height}` : `${w.width}×${w.height}`;
      const extras = [
        w.blind ? (w.blind==='pull'?'תריס משוך':'תריס מוקצף') : null,
        w.screen ? 'רשת' : null,
        w.blindMotor ? '⚡ מנוע' : null
      ].filter(Boolean).join(', ') || '—';
      return `<tr style="border-top:1px solid #e8edf2;background:${i%2===0?'transparent':'#f8fafc'}">
        <td style="padding:5px 8px;">${w.location||`חלון ${i+1}`}</td>
        <td style="padding:5px 8px;">סדרה ${w.series||'7000'}</td>
        <td style="padding:5px 8px;font-family:monospace;">${dims}</td>
        <td style="padding:5px 8px;">${openMap[w.openingType]||w.openingType||'הזזה'}</td>
        <td style="padding:5px 8px;">${glassMap[w.glass]||w.glass||'—'}</td>
        <td style="padding:5px 8px;font-size:0.76rem;">${extras}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;

    if (cfg.notes) html += `<div style="margin-top:0.75rem;font-size:0.81rem;color:#64748b;"><strong>הערות:</strong> ${cfg.notes}</div>`;
  }

  html += `<div class="detail-totals">
    <div class="detail-total-row grand"><span>סה"כ כולל מע"מ</span><span>₪${Number(o.subtotal || o.total_price || 0).toLocaleString()}</span></div>
  </div>`;

  if (o.status === 'technical_review') {
    html += `<button class="btn-approve-production" id="approveBtn-${o.id}" onclick="approveToProduction('${o.id}')">
      <i class="ph ph-check-circle"></i> נבדק — אשר לייצור
    </button>`;
  }

  html += `<button class="btn-pdf" onclick="generatePDF('${o.id}')">
    <i class="ph ph-file-pdf"></i> הפק PDF
  </button>`;

  html += `<div class="audit-log-section" id="audit-section"></div>`;

  document.getElementById('detailBody').innerHTML = html;
  renderAuditSection(o.id);
  document.getElementById('detailOverlay').classList.add('open');

  // Render barcode after DOM update
  try {
    JsBarcode(`#barcode-${o.id}`, code, {
      format: 'CODE128', width: 2, height: 50,
      displayValue: true, fontSize: 13, margin: 8
    });
  } catch(e) { console.warn('JsBarcode:', e); }
};

/* ── GENERATE PDF ── */
window.generatePDF = async function(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o || !window.jspdf) return;

  const code = getCode(o);
  const detailBody = document.getElementById('detailBody');

  // הסתר כפתורים לפני הצילום
  const btns = detailBody.querySelectorAll('button');
  btns.forEach(b => b.style.display = 'none');

  try {
    const canvas = await html2canvas(detailBody, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    const imgData   = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const doc       = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW   = 210;
    const marginX = 10;
    const imgW    = pageW - marginX * 2;
    const imgH    = canvas.height * imgW / canvas.width;

    // Header bar
    doc.setFillColor(26, 95, 170);
    doc.rect(0, 0, 210, 18, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.text('ALUM-IL', 190, 12, { align: 'right' });
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('Order Confirmation | ' + code, 20, 12);

    // תוכן הפאנל כתמונה
    doc.addImage(imgData, 'PNG', marginX, 22, imgW, imgH);

    // Footer
    doc.setFontSize(8);
    doc.setTextColor(150, 160, 180);
    doc.text('Generated by ALUM-IL Platform', 105, 285, { align: 'center' });

    doc.save('order_' + code + '.pdf');
  } finally {
    // החזר כפתורים
    btns.forEach(b => b.style.display = '');
  }
};

window.approveToProduction = async function(id) {
  const btn = document.getElementById(`approveBtn-${id}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ph ph-circle-notch spin"></i> שומר...'; }

  const { error } = await supabase.from('orders')
    .update({ status: 'in_production', updated_at: new Date().toISOString(), status_updated_at: new Date().toISOString() })
    .eq('id', id);

  if (error) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ph ph-check-circle"></i> נבדק — אשר לייצור'; }
    return;
  }

  // Update local cache + close panel + refresh table
  const o = allOrders.find(x => x.id === id);
  const prevSt = o?.status || 'technical_review';
  if (o) o.status = 'in_production';
  logOrderAction(id, 'approve', { status: prevSt }, { status: 'in_production' });
  document.getElementById('detailOverlay').classList.remove('open');
  renderTable();
};

window.closeDetail = function(e) {
  if (!e || e.target === document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('open');
  }
};

/* ── AUDIT LOG ── */
async function logOrderAction(orderId, action, beforeData, afterData) {
  try {
    const { data: { user } } = await supabase.auth.getUser();
    await supabase.from('orders_audit_log').insert({
      order_id: orderId,
      action,
      admin_id: user?.id || null,
      admin_email: user?.email || 'unknown',
      before_data: beforeData,
      after_data: afterData
    });
  } catch(e) { console.warn('audit log:', e); }
}

async function loadAuditLog(orderId) {
  try {
    const { data, error } = await supabase
      .from('orders_audit_log')
      .select('*')
      .eq('order_id', orderId)
      .order('created_at', { ascending: false })
      .limit(30);
    if (error) throw error;
    return data || [];
  } catch(e) { return null; }
}

const STATUS_LABELS_AUDIT = {
  quote:'הצעת מחיר', draft:'טיוטה', pending:'ממתין לאישור',
  technical_review:'בבדיקה טכנית', in_production:'בתהליך ייצור',
  ready_for_delivery:'מוכן למסירה', delivered:'נמסר',
  cancelled:'בוטל', dispute:'מחלוקת'
};
const ACTION_LABELS = { status_change:'שינוי סטטוס', approve:'אושר לייצור', edit:'עריכה', delete:'מחיקה' };

async function renderAuditSection(orderId) {
  const el = document.getElementById('audit-section');
  if (!el) return;
  el.innerHTML = `<div class="audit-log-title"><i class="ph ph-clock-counter-clockwise"></i> היסטוריית עריכות</div><div class="audit-empty"><i class="ph ph-circle-notch spin"></i></div>`;

  const entries = await loadAuditLog(orderId);
  if (entries === null) {
    el.innerHTML = `<div class="audit-log-title"><i class="ph ph-clock-counter-clockwise"></i> היסטוריית עריכות</div><div class="audit-empty">טבלת audit לא נמצאה</div>`;
    return;
  }
  if (entries.length === 0) {
    el.innerHTML = `<div class="audit-log-title"><i class="ph ph-clock-counter-clockwise"></i> היסטוריית עריכות</div><div class="audit-empty">אין רשומות עדיין</div>`;
    return;
  }

  const rows = entries.map(e => {
    const fmtDate = iso => {
      const d = new Date(iso);
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };
    const dotClass = e.action === 'delete' ? 'audit-dot-delete' : e.action === 'status_change' || e.action === 'approve' ? 'audit-dot-status' : 'audit-dot-edit';
    const actionLabel = ACTION_LABELS[e.action] || e.action;
    let changeHtml = '';
    if (e.action === 'status_change' && e.before_data?.status && e.after_data?.status) {
      changeHtml = `<div class="audit-change">
        <span class="audit-before">${STATUS_LABELS_AUDIT[e.before_data.status] || e.before_data.status}</span>
        <span class="audit-arrow">←</span>
        <span class="audit-after">${STATUS_LABELS_AUDIT[e.after_data.status] || e.after_data.status}</span>
      </div>`;
    } else if (e.action === 'approve') {
      changeHtml = `<div class="audit-change"><span class="audit-after">אושר לייצור</span></div>`;
    }
    return `<div class="audit-entry">
      <div class="audit-dot ${dotClass}"></div>
      <div class="audit-meta">
        <span class="audit-who">${e.admin_email || 'לא ידוע'}</span>
        <span class="audit-what"> — ${actionLabel}</span>
        ${changeHtml}
        <div class="audit-time">${fmtDate(e.created_at)}</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="audit-log-title"><i class="ph ph-clock-counter-clockwise"></i> היסטוריית עריכות</div>${rows}`;
}

init();
</script>
