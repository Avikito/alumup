<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALUM-IL | קונפיגורטור פרגולה חשמלית</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --surface2: #181c22;
            --surface3: #1e2430;
            --border: #2a3040;
            --border2: #3a4558;
            --blue: #00c3ff;
            --blue-dim: rgba(0, 195, 255, 0.12);
            --blue-mid: rgba(0, 195, 255, 0.25);
            --white: #f0f4f8;
            --silver: #8899aa;
            --silver2: #aabbc8;
            --green: #00e5a0;
            --red: #ff4d6a;
            --gold: #ffd166;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .logo i {
            color: var(--blue);
            font-size: 1.6rem;
        }

        .page-wrapper {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 220px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 2rem 1rem;
            flex-shrink: 0;
        }

        .sidebar-label {
            color: var(--silver);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            padding-right: 0.5rem;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            color: var(--silver2);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .sidebar-nav li a:hover {
            background: var(--surface2);
            color: var(--white);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-x: hidden;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .page-sub {
            color: var(--silver);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

            align-items: center;
