<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | אישור משתמשים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-wrapper { display:flex; flex:1; min-height:calc(100vh - 64px); }

    .admin-sidebar {
      width:220px; flex-shrink:0;
      background:var(--surface-dark);
      border-left:1px solid var(--border);
      padding:1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:1.5rem; }

    /* ── SEARCH BAR ── */
    .toolbar {
      display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;
    }
    .search-input {
      padding:0.45rem 1rem;border:1.5px solid var(--border);border-radius:8px;
      font-family:'Heebo',sans-serif;font-size:0.88rem;color:var(--industrial-silver);
      background:var(--surface-dark);min-width:240px;
    }
    .search-input:focus { outline:none;border-color:var(--electric-blue); }
    .count-label { font-size:0.82rem;color:var(--silver-dark); }

    /* ── TABLE ── */
    .users-table-wrap { overflow-x:auto;border-radius:12px;border:1px solid var(--border); }
    .users-table { width:100%;border-collapse:collapse;font-size:0.88rem; }
    .users-table th {
      background:#f7f9fd;padding:0.75rem 1rem;
      text-align:right;font-size:0.72rem;font-weight:700;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);
    }
    .users-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .users-table tr:last-child td { border-bottom:none; }
    .users-table tr:hover td { background:var(--blue-dim); }

    /* ── BADGES ── */
    .type-badge {
      display:inline-flex;align-items:center;padding:0.15rem 0.55rem;
      border-radius:20px;font-size:0.72rem;font-weight:700;margin:0.15rem 0.15rem 0.15rem 0;
      background:rgba(26,95,170,0.09);color:var(--electric-blue);
      border:1px solid rgba(26,95,170,0.2);
    }
    .spec-tag {
      display:inline-block;padding:0.12rem 0.45rem;
      border-radius:5px;font-size:0.7rem;font-weight:600;margin:0.1rem 0.1rem 0.1rem 0;
      background:rgba(26,95,170,0.05);color:var(--silver-dark);
      border:1px solid var(--border);
    }

    /* ── ACTION BUTTONS ── */
    .btn-approve, .btn-reject {
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.3rem 0.75rem;border:none;border-radius:7px;
      font-family:'Heebo',sans-serif;font-size:0.8rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;
    }
    .btn-approve {
      background:rgba(22,163,74,0.1);color:#16a34a;
      border:1.5px solid rgba(22,163,74,0.25);
    }
    .btn-approve:hover { background:rgba(22,163,74,0.18); }
    .btn-reject {
      background:rgba(220,38,38,0.08);color:#dc2626;
      border:1.5px solid rgba(220,38,38,0.22);
    }
    .btn-reject:hover { background:rgba(220,38,38,0.14); }
    .btn-approve:disabled, .btn-reject:disabled { opacity:0.4;pointer-events:none; }

    .actions-cell { display:flex;gap:0.4rem;align-items:center; }

    /* ── FADE OUT ── */
    .fading-out {
      animation: fadeRowOut 0.4s ease forwards;
    }
    @keyframes fadeRowOut {
      from { opacity:1;transform:translateX(0); }
      to   { opacity:0;transform:translateX(20px); }
    }

    .empty-state { text-align:center;padding:3rem;color:var(--silver-dark); }
    .empty-state i { font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.3; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite;display:inline-block; }

    .date-cell { color:var(--silver-dark);font-size:0.82rem; }
    .biz-name  { font-weight:700;color:var(--industrial-silver); }
    .biz-id    { font-size:0.78rem;color:var(--silver-dark); }
    .phone-cell { direction:ltr;text-align:right;font-size:0.85rem; }

    /* empty approved state */
    .all-clear {
      text-align:center;padding:3rem 2rem;
      background:rgba(22,163,74,0.04);border-radius:12px;
      border:1px dashed rgba(22,163,74,0.25);
    }
    .all-clear i { font-size:2.5rem;color:#16a34a;opacity:0.6;display:block;margin-bottom:0.5rem; }
    .all-clear p { color:var(--silver-dark);font-size:0.92rem;font-weight:600; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div class="page-title">אישור משתמשים</div>
      <div class="page-subtitle">בקשות הצטרפות הממתינות לאישור</div>

      <div class="toolbar">
        <input class="search-input" type="text" placeholder="חיפוש לפי שם עסק או ח\"פ..." id="searchInput" oninput="filterRows()">
        <span class="count-label" id="countLabel"></span>
      </div>

      <div class="users-table-wrap" id="tableWrap">
        <table class="users-table" id="usersTable">
          <thead>
            <tr>
              <th>תאריך הרשמה</th>
              <th>שם עסק</th>
              <th>ח"פ / ע"מ</th>
              <th>טלפון</th>
              <th>סוג גורם</th>
              <th>התמחויות</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--silver-dark);">
              <i class="ph ph-circle-notch spin"></i> טוען...
            </td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://exfdjelwyrspfspcevvm.supabase.co',
  'sb_publishable_6Yb2QjjK9jkDpvAeIZuOxA_g1KEA4ED'
);

async function requireAdmin() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return null; }
  const { data: adminRow } = await supabase
    .from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
  if (!adminRow) { window.location.href = 'dashboard.html'; return null; }
  return user;
}

(function() {
  const items = [
    { id: 'overview',  icon: 'ph-chart-bar',   label: 'סקירה כללית',    href: 'admin-overview.html' },
    { id: 'users',     icon: 'ph-users',        label: 'אישור משתמשים', href: 'admin-users.html' },
    { id: 'orders',    icon: 'ph-list-bullets', label: 'הזמנות',         href: 'admin.html' },
    { id: 'settings',  icon: 'ph-gear-six',     label: 'תמחור גלובלי',  href: 'admin-settings.html' },
  ];
  const el = document.getElementById('admin-sidebar-placeholder');
  if (el) el.innerHTML = `<div class="sidebar-label">ניהול</div><ul class="admin-nav">${
    items.map(i => `<li><a href="${i.href}" class="${i.id==='users'?'active':''}"><i class="ph ${i.icon}"></i> ${i.label}</a></li>`).join('')
  }</ul>`;
})();

let allUsers = [];

const TYPE_LABELS = {
  contractor: 'קבלן',
  installer: 'מתקין',
  architect: 'אדריכל',
  designer: 'מעצב',
  supplier: 'ספק',
  other: 'אחר'
};

const SPEC_LABELS = {
  pergola: 'פרגולה',
  awning: 'מתיחה',
  facade: 'חיפוי',
  railing: 'מעקה',
  window: 'חלון ודלת',
  glazing: 'זיגוג'
};

async function init() {
  const user = await requireAdmin();
  if (!user) return;
  await loadUsers();
}

async function loadUsers() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .eq('status', 'pending')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('usersBody').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#dc2626;">שגיאה בטעינה</td></tr>`;
    return;
  }

  allUsers = data || [];
  renderTable(allUsers);
}

function renderTable(users) {
  document.getElementById('countLabel').textContent = `${users.length} ממתינים לאישור`;

  const tbody = document.getElementById('usersBody');
  if (users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="all-clear">
        <i class="ph ph-check-circle"></i>
        <p>אין בקשות ממתינות — הכל מעודכן!</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = users.map(u => {
    const date = new Date(u.created_at).toLocaleDateString('he-IL');
    const types = (u.user_type || []).map(t => `<span class="type-badge">${TYPE_LABELS[t] || t}</span>`).join('');
    const specs = (u.specialties || []).map(s => `<span class="spec-tag">${SPEC_LABELS[s] || s}</span>`).join('');

    return `<tr id="row-${u.id}" data-name="${(u.business_name||'').toLowerCase()}" data-bid="${(u.business_id||'').toLowerCase()}">
      <td class="date-cell">${date}</td>
      <td>
        <div class="biz-name">${u.business_name || '—'}</div>
        <div style="font-size:0.78rem;color:var(--silver-dark)">${u.full_name || ''}</div>
      </td>
      <td class="biz-id">${u.business_id || '—'}</td>
      <td class="phone-cell">${u.phone || '—'}</td>
      <td>${types || '<span style="color:var(--silver-dark);font-size:0.8rem;">—</span>'}</td>
      <td>${specs || '<span style="color:var(--silver-dark);font-size:0.8rem;">—</span>'}</td>
      <td>
        <div class="actions-cell">
          <button class="btn-approve" id="approve-${u.id}" onclick="handleAction('${u.id}','approved')">
            <i class="ph ph-check"></i> אשר
          </button>
          <button class="btn-reject" id="reject-${u.id}" onclick="handleAction('${u.id}','rejected')">
            <i class="ph ph-x"></i> דחה
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

window.handleAction = async function(id, newStatus) {
  const approveBtn = document.getElementById(`approve-${id}`);
  const rejectBtn  = document.getElementById(`reject-${id}`);
  if (approveBtn) approveBtn.disabled = true;
  if (rejectBtn)  rejectBtn.disabled = true;

  const { error } = await supabase
    .from('profiles')
    .update({ status: newStatus })
    .eq('id', id);

  if (error) {
    if (approveBtn) approveBtn.disabled = false;
    if (rejectBtn)  rejectBtn.disabled = false;
    alert('שגיאה בעדכון סטטוס');
    return;
  }

  // Fade out the row
  const row = document.getElementById(`row-${id}`);
  if (row) {
    row.classList.add('fading-out');
    setTimeout(() => {
      row.remove();
      allUsers = allUsers.filter(u => u.id !== id);
      document.getElementById('countLabel').textContent = `${allUsers.length} ממתינים לאישור`;
      if (allUsers.length === 0) {
        document.getElementById('usersBody').innerHTML = `<tr><td colspan="7">
          <div class="all-clear">
            <i class="ph ph-check-circle"></i>
            <p>אין בקשות ממתינות — הכל מעודכן!</p>
          </div>
        </td></tr>`;
      }
    }, 420);
  }
};

window.filterRows = function() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  if (!q) { renderTable(allUsers); return; }
  const filtered = allUsers.filter(u =>
    (u.business_name || '').toLowerCase().includes(q) ||
    (u.business_id || '').toLowerCase().includes(q) ||
    (u.full_name || '').toLowerCase().includes(q)
  );
  renderTable(filtered);
};

init();
</script>
</body>
</html>
