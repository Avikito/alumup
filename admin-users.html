<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-wrapper { display:flex; flex:1; min-height:calc(100vh - 64px); }

    .admin-sidebar {
      width:220px; flex-shrink:0;
      background:var(--surface-dark);
      border-left:1px solid var(--border);
      padding:1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:1.5rem; }

    /* ── SEARCH BAR ── */
    .toolbar {
      display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;
    }
    .search-input {
      padding:0.45rem 1rem;border:1.5px solid var(--border);border-radius:8px;
      font-family:'Heebo',sans-serif;font-size:0.88rem;color:var(--industrial-silver);
      background:var(--surface-dark);min-width:240px;
    }
    .search-input:focus { outline:none;border-color:var(--electric-blue); }
    .count-label { font-size:0.82rem;color:var(--silver-dark); }

    /* ── TABLE ── */
    .users-table-wrap { overflow-x:auto;border-radius:12px;border:1px solid var(--border); }
    .users-table { width:100%;border-collapse:collapse;font-size:0.88rem; }
    .users-table th {
      background:#f7f9fd;padding:0.75rem 1rem;
      text-align:right;font-size:0.72rem;font-weight:700;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);
    }
    .users-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .users-table tr:last-child td { border-bottom:none; }
    .users-table tr:hover td { background:var(--blue-dim); }

    /* ── BADGES ── */
    .type-badge {
      display:inline-flex;align-items:center;padding:0.15rem 0.55rem;
      border-radius:20px;font-size:0.72rem;font-weight:700;margin:0.15rem 0.15rem 0.15rem 0;
      background:rgba(26,95,170,0.09);color:var(--electric-blue);
      border:1px solid rgba(26,95,170,0.2);
    }
    .spec-tag {
      display:inline-block;padding:0.12rem 0.45rem;
      border-radius:5px;font-size:0.7rem;font-weight:600;margin:0.1rem 0.1rem 0.1rem 0;
      background:rgba(26,95,170,0.05);color:var(--silver-dark);
      border:1px solid var(--border);
    }

    /* ── ACTION BUTTONS ── */
    .btn-approve, .btn-reject {
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.3rem 0.75rem;border:none;border-radius:7px;
      font-family:'Heebo',sans-serif;font-size:0.8rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;
    }
    .btn-approve {
      background:rgba(22,163,74,0.1);color:#16a34a;
      border:1.5px solid rgba(22,163,74,0.25);
    }
    .btn-approve:hover { background:rgba(22,163,74,0.18); }
    .btn-reject {
      background:rgba(220,38,38,0.08);color:#dc2626;
      border:1.5px solid rgba(220,38,38,0.22);
    }
    .btn-reject:hover { background:rgba(220,38,38,0.14); }
    .btn-approve:disabled, .btn-reject:disabled { opacity:0.4;pointer-events:none; }

    .actions-cell { display:flex;gap:0.4rem;align-items:center; }

    /* ── FADE OUT ── */
    .fading-out {
      animation: fadeRowOut 0.4s ease forwards;
    }
    @keyframes fadeRowOut {
      from { opacity:1;transform:translateX(0); }
      to   { opacity:0;transform:translateX(20px); }
    }

    .empty-state { text-align:center;padding:3rem;color:var(--silver-dark); }
    .empty-state i { font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.3; }

    @keyframes spin { to { transform:rotate(360deg); } }

    .date-cell { color:var(--silver-dark);font-size:0.82rem; }

    .biz-id    { font-size:0.78rem;color:var(--silver-dark); }
    .phone-cell { direction:ltr;text-align:right;font-size:0.85rem; }

    /* ── CHANGE REQUESTS SECTION ── */
    .cr-section {
      margin-bottom: 2rem;
      border: 1.5px solid rgba(217,119,6,0.35);
      border-radius: 12px;
      overflow: hidden;
    }
    .cr-section-header {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.85rem 1.25rem;
      background: rgba(217,119,6,0.08);
      border-bottom: 1px solid rgba(217,119,6,0.2);

    }
    .cr-section-header i { font-size: 1.1rem; }
    .cr-badge {
      background: rgba(217,119,6,0.15); color: #b45309;
      border: 1px solid rgba(217,119,6,0.3);
      border-radius: 20px; padding: 0.1rem 0.55rem;
      font-size: 0.72rem; font-weight: 700; margin-right: auto;
    }
    .cr-table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    .cr-table th {
      background: rgba(217,119,6,0.05);
      padding: 0.65rem 1rem; text-align: right;
      font-size: 0.72rem; font-weight: 700; color: #92400e;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(217,119,6,0.15);
    }
    .cr-table td { padding: 0.85rem 1rem; border-bottom: 1px solid rgba(217,119,6,0.1); vertical-align: top; }
    .cr-table tr:last-child td { border-bottom: none; }
    .cr-table tr:hover td { background: rgba(217,119,6,0.04); }
    .cr-compare { display: flex; flex-direction: column; gap: 0.35rem; min-width: 200px; }
    .cr-compare-row { display: flex; align-items: baseline; gap: 0.4rem; font-size: 0.82rem; }
    .cr-label { font-size: 0.7rem; font-weight: 700; color: #92400e; min-width: 65px; }
    .cr-old { color: var(--silver-dark); text-decoration: line-through; opacity: 0.7; }
    .cr-arrow { color: #b45309; font-size: 0.75rem; }
    .cr-new { font-weight: 700; color: #15803d; }
    .cr-field-badge {
      display: inline-flex; align-items: center;
      padding: 0.15rem 0.55rem; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700;
      background: rgba(217,119,6,0.12); color: #b45309;
      border: 1px solid rgba(217,119,6,0.25);
    }
    .cr-note-input {
      width: 100%; min-width: 180px; padding: 0.4rem 0.6rem;
      border: 1.5px solid rgba(217,119,6,0.25); border-radius: 7px;
      background: rgba(217,119,6,0.04); color: var(--industrial-silver);
      font-family: 'Heebo', sans-serif; font-size: 0.82rem;
      resize: vertical; outline: none; box-sizing: border-box;
    }
    .cr-note-input:focus { border-color: #b45309; }
    .cr-actions { display: flex; flex-direction: column; gap: 0.4rem; }
    .btn-cr-approve {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.85rem; border-radius: 7px;
      font-family: 'Heebo', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s ease; white-space: nowrap;
      background: rgba(22,163,74,0.1); color: #16a34a;
      border: 1.5px solid rgba(22,163,74,0.28);
    }
    .btn-cr-approve:hover { background: rgba(22,163,74,0.18); }
    .btn-cr-reject {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.85rem; border-radius: 7px;
      font-family: 'Heebo', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s ease; white-space: nowrap;
      background: rgba(220,38,38,0.08); color: #dc2626;
      border: 1.5px solid rgba(220,38,38,0.25);
    }
    .btn-cr-reject:hover { background: rgba(220,38,38,0.14); }
    .btn-cr-approve:disabled, .btn-cr-reject:disabled { opacity: 0.4; pointer-events: none; }
    .cr-empty {
      padding: 1.5rem; text-align: center;
      color: #92400e; opacity: 0.5; font-size: 0.88rem;
    }

    /* empty approved state */
    .all-clear {
      text-align:center;padding:3rem 2rem;
      background:rgba(22,163,74,0.04);border-radius:12px;
      border:1px dashed rgba(22,163,74,0.25);
    }
    .all-clear i { font-size:2.5rem;color:#16a34a;opacity:0.6;display:block;margin-bottom:0.5rem; }
    .all-clear p { color:var(--silver-dark);font-size:0.92rem;font-weight:600; }
  </style>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(

  const { data: adminRow } = await supabase
    .from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
  if (!adminRow) { window.location.href = 'login.html'; return null; }
  if (user.email !== 'avihay305@gmail.com') { window.location.href = 'login.html'; return null; }
  return user;
}

(function() {

    { id: 'users',     icon: 'ph-users',            label: 'אישור משתמשים', href: 'admin-users.html' },

    { id: 'financial', icon: 'ph-currency-circle-dollar', label: 'ניהול פיננסי', href: 'admin-financial.html' },

  }</ul>`;

let allUsers = [];

const TYPE_LABELS = {
  installer:    'מתקין',
  manufacturer: 'יצרן אלומיניום',
  importer:     'יבואן',
  metalworker:  'מסגר',
  warehouse:    'מחסן חומרי גלם',
  gardening:    'גינון ופיתוח',
  contractor:   'קבלן',
  architect:    'אדריכל',
  entrepreneur: 'יזם',
  designer:     'מעצב',
  supplier:     'ספק',
  other:        'אחר'
};

const REGION_LABELS = {
  north: 'צפון', haifa: 'חיפה והסביבה', sharon: 'שרון',
  center: 'מרכז', jerusalem: 'ירושלים', south: 'דרום', eilat: 'אילת והערבה'
};

const SPEC_LABELS = {
  pergolas:            'פרגולות',
  'electric-pergolas': 'פרגולות חשמליות',
  'zip-screens':       'מסכי זיפ',
  'windows-shutters':  'חלונות ותריסים',
  'gates-fences':      'שערים וגדרות',
  'curtain-walls':     'קירות מסך',
  'doors-cladding':    'דלתות וחיפויים',
  'service-repairs':   'שירות ותיקונים',
};

async function init() {
  const user = await requireAdmin();
  if (!user) return;
  await Promise.all([loadUsers(), loadChangeRequests()]);
}

// map field label → profile column
const FIELD_TO_COL = {
  'שם העסק':  'business_name',
  'ח.פ / ע.מ':'business_id',
  'כתובת':    'business_address',
  'טלפון':    'phone',
  'אימייל':   'email',
};
const FIELD_LABEL = {
  business_name:    'שם העסק',
  business_id:      'ח.פ / ע.מ',
  business_address: 'כתובת',
  phone:            'טלפון',
  email:            'אימייל',
};

// parse "שם העסק: value\nטלפון: value" → [{label, newVal}]
function parseNewValue(str) {
  return (str || '').split('\n').map(line => {
    const idx = line.indexOf(':');
    if (idx === -1) return null;
    return { label: line.slice(0, idx).trim(), newVal: line.slice(idx + 1).trim() };
  }).filter(Boolean);
}

let crRequests = []; // store for markCrDone

async function loadChangeRequests() {
  const { data, error } = await supabase
    .from('change_requests')
    .select('*')
    .eq('status', 'pending')
    .order('created_at', { ascending: false });

  if (error || !data?.length) {
    document.getElementById('crSection').style.display = 'none';
    return;
  }

  // fetch matching profiles for old values
  const userIds = [...new Set(data.map(r => r.user_id).filter(Boolean))];
  let profileMap = {};
  if (userIds.length) {
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, business_name, business_id, business_address, phone, email')
      .in('id', userIds);
    (profiles || []).forEach(p => { profileMap[p.id] = p; });
  }

  crRequests = data;
  document.getElementById('crSection').style.display = 'block';
  document.getElementById('crBadge').textContent = data.length;

  document.getElementById('crBody').innerHTML = data.map(r => {
    const date    = r.created_at ? new Date(r.created_at).toLocaleDateString('he-IL') : '—';
    const profile = profileMap[r.user_id] || {};
    const changes = parseNewValue(r.new_value);

    const compareHTML = changes.length
      ? `<div class="cr-compare">${changes.map(c => {
          const col = FIELD_TO_COL[c.label];
          const oldVal = col ? (profile[col] || '—') : '—';
          return `<div class="cr-compare-row">
            <span class="cr-label">${c.label}</span>
            <span class="cr-old">${oldVal}</span>
            <span class="cr-arrow">←</span>
            <span class="cr-new">${c.newVal}</span>
          </div>`;
        }).join('')}</div>`
      : `<span style="color:var(--silver-dark);font-size:0.82rem;">${r.new_value || '—'}</span>`;

    const clientNote = r.notes
      ? `<span style="font-size:0.8rem;color:var(--silver-dark);">${r.notes}</span>`
      : '<span style="opacity:0.4;font-size:0.8rem;">—</span>';

    return `<tr id="crrow-${r.id}">
      <td class="date-cell" style="white-space:nowrap;">${date}</td>
      <td style="font-size:0.82rem;">
        <div style="font-weight:700;color:var(--industrial-silver);">${profile.business_name || '—'}</div>
        <div style="color:var(--silver-dark);font-size:0.76rem;">${r.user_email || ''}</div>
      </td>
      <td>${compareHTML}</td>
      <td>${clientNote}</td>
      <td>
        <textarea id="crnote-${r.id}" class="cr-note-input" rows="2"
          placeholder="הערה פנימית לתיעוד ב-CRM..."></textarea>
      </td>
      <td>
        <div class="cr-actions">
          <button class="btn-cr-approve" id="crbtn-approve-${r.id}" onclick="handleCr('${r.id}','approved')">
            <i class="ph ph-check"></i> אשר
          </button>
          <button class="btn-cr-reject" id="crbtn-reject-${r.id}" onclick="handleCr('${r.id}','rejected')">
            <i class="ph ph-x"></i> דחה
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

window.handleCr = async function(id, action) {
  const approveBtn = document.getElementById(`crbtn-approve-${id}`);
  const rejectBtn  = document.getElementById(`crbtn-reject-${id}`);
  const note = document.getElementById(`crnote-${id}`)?.value.trim();
  if (approveBtn) approveBtn.disabled = true;
  if (rejectBtn)  rejectBtn.disabled  = true;
  if (action === 'approved' && approveBtn)
    approveBtn.innerHTML = '<i class="ph ph-circle-notch spin"></i>';
  else if (rejectBtn)
    rejectBtn.innerHTML  = '<i class="ph ph-circle-notch spin"></i>';

  const req = crRequests.find(r => r.id === id);

  try {
    // 1. update change_request status
    const { error } = await supabase
      .from('change_requests')
      .update({ status: action, admin_note: note || null })
      .eq('id', id);
    if (error) throw error;

    if (req?.user_id) {
      const { data: profData } = await supabase
        .from('profiles').select('member_activity_log').eq('id', req.user_id).single();

      const logEntry = {
        action:     action === 'approved' ? 'change_request_approved' : 'change_request_rejected',
        label:      action === 'approved'
          ? `בקשת שינוי פרטים אושרה: ${req.field}`
          : `בקשת שינוי פרטים נדחתה: ${req.field}`,
        details:    req.new_value,
        admin_note: note || null,
        by_role:    'admin',
        at:         new Date().toISOString(),
      };
      const log = [...(profData?.member_activity_log || []), logEntry];

      let profileUpdate = { member_activity_log: log };

      // אם אושר — עדכן גם את שדות הפרופיל
      if (action === 'approved') {
        const changes = parseNewValue(req.new_value);
        changes.forEach(c => {
          const col = FIELD_TO_COL[c.label];
          if (col) profileUpdate[col] = c.newVal;
        });
      }

      const { error: profErr } = await supabase
        .from('profiles').update(profileUpdate).eq('id', req.user_id);
      if (profErr) throw profErr;
    }

    // fade out row
    const row = document.getElementById(`crrow-${id}`);
    if (row) {
      row.classList.add('fading-out');
      setTimeout(() => {
        row.remove();
        crRequests = crRequests.filter(r => r.id !== id);
        document.getElementById('crBadge').textContent = crRequests.length;
        if (crRequests.length === 0) document.getElementById('crSection').style.display = 'none';
      }, 420);
    }
  } catch (e) {
    alert('שגיאה: ' + e.message);
    if (approveBtn) { approveBtn.disabled = false; approveBtn.innerHTML = '<i class="ph ph-check"></i> אשר'; }
    if (rejectBtn)  { rejectBtn.disabled  = false; rejectBtn.innerHTML  = '<i class="ph ph-x"></i> דחה'; }
  }
};

async function loadUsers() {
  console.log('[USERS] loadUsers() called');
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .or('is_approved.is.null,is_approved.eq.false')
    .order('created_at', { ascending: false });

  console.log('[USERS] query result — data:', data, '| error:', error);

  if (error) {
    console.error('[USERS] Supabase error:', error.message, error.code, error.details);
    document.getElementById('usersBody').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:#dc2626;">שגיאה בטעינה: ${error.message}</td></tr>`;
    return;
  }

  console.log('[USERS] rows returned:', data?.length ?? 0);
  allUsers = data || [];
  renderTable(allUsers);
}

function toArr(v) {
  if (Array.isArray(v)) return v;
  if (!v) return [];
  try { const p = JSON.parse(v); return Array.isArray(p) ? p : [p]; } catch { return [v]; }
}

function renderTable(users) {
  document.getElementById('countLabel').textContent = `${users.length} ממתינים לאישור`;

  const tbody = document.getElementById('usersBody');
  if (users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="all-clear">
        <i class="ph ph-check-circle"></i>
        <p>אין בקשות ממתינות — הכל מעודכן!</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = users.map(u => {
    try {
      const date = u.created_at ? new Date(u.created_at).toLocaleDateString('he-IL') : '—';

      const typeArr   = toArr(u.user_type);
      const specArr   = toArr(u.specialties);
      const regionArr = toArr(u.regions);

      const types   = typeArr.map(t   => `<span class="type-badge">${TYPE_LABELS[t]   || t}</span>`).join('');
      const specs   = specArr.map(s   => `<span class="spec-tag">${SPEC_LABELS[s]     || s}</span>`).join('');
      const regions = regionArr.map(r => `<span class="spec-tag">${REGION_LABELS[r]   || r}</span>`).join('');

      return `<tr id="row-${u.id}" data-name="${(u.business_name||'').toLowerCase()}" data-bid="${(u.business_id||'').toLowerCase()}">
        <td class="date-cell">${date}</td>
        <td>
          <div class="biz-name">${u.business_name || '—'}</div>
          <div style="font-size:0.78rem;color:var(--silver-dark)">${u.full_name || ''}</div>
        </td>
        <td style="font-size:0.82rem;color:var(--silver-dark);">${u.email || '—'}</td>
        <td class="biz-id">${u.business_id || '—'}</td>
        <td class="phone-cell">${u.phone || '—'}</td>
        <td>${types || '<span style="color:var(--silver-dark);font-size:0.8rem;">—</span>'}</td>
        <td>${specs}${regions ? (specs ? '<br>' : '') + regions : ''}</td>
        <td>
          <div class="actions-cell">
            <button class="btn-approve" id="approve-${u.id}" onclick="handleAction('${u.id}','approved')">
              <i class="ph ph-check"></i> אשר
            </button>
            <button class="btn-reject" id="reject-${u.id}" onclick="handleAction('${u.id}','rejected')">
              <i class="ph ph-x"></i> דחה
            </button>
          </div>
        </td>
      </tr>`;
    } catch (rowErr) {
      console.error('[USERS] renderTable row error for id:', u?.id, rowErr);
      return `<tr><td colspan="8" style="color:#dc2626;padding:0.5rem 1rem;">שגיאה בשורה: ${u?.business_name || u?.id || '?'}</td></tr>`;
    }
  }).join('');
}

window.handleAction = async function(id, newStatus) {
  const approveBtn = document.getElementById(`approve-${id}`);
  const rejectBtn  = document.getElementById(`reject-${id}`);
  if (approveBtn) approveBtn.disabled = true;
  if (rejectBtn)  rejectBtn.disabled = true;

  const approved = (newStatus === 'approved');
  const { error } = await supabase
    .from('profiles')
    .update({ is_approved: approved })
    .eq('id', id);

  if (error) {
    if (approveBtn) approveBtn.disabled = false;
    if (rejectBtn)  rejectBtn.disabled = false;
    alert('שגיאה בעדכון סטטוס');
    return;
  }

  // Fade out the row
  const row = document.getElementById(`row-${id}`);
  if (row) {
    row.classList.add('fading-out');
    setTimeout(() => {
      row.remove();
      allUsers = allUsers.filter(u => u.id !== id);
      document.getElementById('countLabel').textContent = `${allUsers.length} ממתינים לאישור`;
      if (allUsers.length === 0) {
        document.getElementById('usersBody').innerHTML = `<tr><td colspan="8">
          <div class="all-clear">
            <i class="ph ph-check-circle"></i>
            <p>אין בקשות ממתינות — הכל מעודכן!</p>
          </div>
        </td></tr>`;
      }
    }, 420);
  }
};

window.filterRows = function() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  if (!q) { renderTable(allUsers); return; }
  const filtered = allUsers.filter(u =>
    (u.business_name || '').toLowerCase().includes(q) ||
    (u.business_id || '').toLowerCase().includes(q) ||
    (u.full_name || '').toLowerCase().includes(q)
  );
  renderTable(filtered);
};

init();
</script>
