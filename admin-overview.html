<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | סקירה כללית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-wrapper { display:flex; flex:1; min-height:calc(100vh - 64px); }

    .admin-sidebar {
      width:220px; flex-shrink:0;
      background:var(--surface-dark);
      border-left:1px solid var(--border);
      padding:1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:2rem; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
      gap:1.25rem;
      margin-bottom:2.5rem;
    }
    .stat-card {
      background:var(--surface-dark);
      border:1px solid var(--border);
      border-radius:14px;
      padding:1.5rem 1.75rem;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
      position:relative;
      overflow:hidden;
      transition:box-shadow 0.2s ease;
    }
    .stat-card:hover { box-shadow:0 4px 20px rgba(26,95,170,0.1); }
    .stat-card::before {
      content:'';
      position:absolute;
      top:0; right:0;
      width:4px; height:100%;
    }
    .stat-card.blue::before  { background:var(--electric-blue); }
    .stat-card.green::before { background:#16a34a; }
    .stat-card.gold::before  { background:#d97706; }
    .stat-card.purple::before{ background:#7c3aed; }

    .stat-icon {
      width:42px; height:42px;
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;
      margin-bottom:0.25rem;
    }
    .stat-card.blue  .stat-icon { background:rgba(26,95,170,0.09); color:var(--electric-blue); }
    .stat-card.green .stat-icon { background:rgba(22,163,74,0.09); color:#16a34a; }
    .stat-card.gold  .stat-icon { background:rgba(217,119,6,0.09);  color:#d97706; }
    .stat-card.purple .stat-icon { background:rgba(124,58,237,0.09);color:#7c3aed; }

    .stat-value {
      font-size:2rem;
      font-weight:800;
      color:var(--industrial-silver);
      line-height:1;
    }
    .stat-label {
      font-size:0.82rem;
      font-weight:600;
      color:var(--silver-dark);
    }
    .stat-loading { opacity:0.35; }

    /* ── RECENT ACTIVITY ── */
    .section-title {
      font-size:1rem;
      font-weight:800;
      color:var(--industrial-silver);
      margin-bottom:1rem;
      display:flex;align-items:center;gap:0.5rem;
    }
    .activity-wrap {
      background:var(--surface-dark);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .activity-table { width:100%;border-collapse:collapse;font-size:0.88rem; }
    .activity-table th {
      background:#f7f9fd;
      padding:0.7rem 1rem;
      text-align:right;
      font-size:0.72rem;font-weight:700;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.5px;
      border-bottom:1px solid var(--border);
    }
    .activity-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .activity-table tr:last-child td { border-bottom:none; }
    .activity-table tr:hover td { background:var(--blue-dim); }

    .status-badge {
      display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.6rem;
      border-radius:20px;font-size:0.74rem;font-weight:700;white-space:nowrap;
    }
    .status-draft      { background:rgba(196,124,0,0.1); color:#a06000;border:1px solid rgba(196,124,0,0.25); }
    .status-production { background:rgba(26,95,170,0.1); color:var(--electric-blue);border:1px solid rgba(26,95,170,0.25); }
    .status-delivered  { background:rgba(22,163,74,0.1); color:#16a34a;border:1px solid rgba(22,163,74,0.25); }

    .empty-state { text-align:center;padding:2.5rem;color:var(--silver-dark); }
    .empty-state i { font-size:2rem;display:block;margin-bottom:0.5rem;opacity:0.3; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite;display:inline-block; }

    .order-code { font-weight:700;color:var(--electric-blue);font-size:0.82rem; }

    /* ── ORDERS FILTER PILLS ── */
    .orders-filter { display:flex; gap:0.25rem; margin-top:0.6rem; flex-wrap:wrap; }
    .ofb {
      padding:0.16rem 0.55rem; border-radius:20px;
      border:1.5px solid rgba(217,119,6,0.35);
      background:transparent; font-family:'Heebo',sans-serif;
      font-size:0.7rem; font-weight:700; color:#d97706;
      cursor:pointer; transition:all 0.15s ease; letter-spacing:0.2px;
    }
    .ofb:hover { background:rgba(217,119,6,0.1); border-color:#d97706; }
    .ofb.active {
      background:#d97706; color:#fff; border-color:#d97706;
      box-shadow:0 2px 8px rgba(217,119,6,0.3);
    }

    /* ── ACTIVITY TABLE STATUS COLORS ── */
    .activity-table tr.row-s-pending td             { background:#FFF4E5; color:#663C00; }
    .activity-table tr.row-s-pending td:first-child { border-right:3px solid #FFB74D; }
    .activity-table tr.row-s-pending:hover td       { background:#FFE0B2; }

    .activity-table tr.row-s-technical_review td             { background:#F3E5F5; color:#4A148C; }
    .activity-table tr.row-s-technical_review td:first-child { border-right:3px solid #CE93D8; }
    .activity-table tr.row-s-technical_review:hover td       { background:#E1BEE7; }

    .activity-table tr.row-s-in_production td             { background:#E3F2FD; color:#0D47A1; }
    .activity-table tr.row-s-in_production td:first-child { border-right:3px solid #64B5F6; }
    .activity-table tr.row-s-in_production:hover td       { background:#BBDEFB; }

    .activity-table tr.row-s-ready_for_delivery td             { background:#C8E6C9; color:#1B5E20; }
    .activity-table tr.row-s-ready_for_delivery td:first-child { border-right:3px solid #81C784; }
    .activity-table tr.row-s-ready_for_delivery:hover td       { background:#A5D6A7; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <span id="adminEmail" style="font-size:0.82rem;color:var(--silver-dark);"></span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div class="page-title">סקירה כללית</div>
      <div class="page-subtitle" id="pageSubtitle">טוען נתונים...</div>

      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon"><i class="ph ph-hourglass-medium"></i></div>
          <div class="stat-value" id="statPending">—</div>
          <div class="stat-label">ממתינים לאישור</div>
        </div>
        <div class="stat-card gold">
          <div class="stat-icon"><i class="ph ph-list-bullets"></i></div>
          <div class="stat-value" id="statOrders">—</div>
          <div class="stat-label">סה"כ הזמנות</div>
          <div class="orders-filter">
            <button class="ofb active" onclick="setOrdersFilter('today',this)">היום</button>
            <button class="ofb" onclick="setOrdersFilter('7',this)">7 ימים</button>
            <button class="ofb" onclick="setOrdersFilter('30',this)">30 ימים</button>
            <button class="ofb" onclick="setOrdersFilter('all',this)">הכל</button>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon"><i class="ph ph-currency-circle-dollar"></i></div>
          <div class="stat-value" id="statRevenue">—</div>
          <div class="stat-label">מחזור כולל</div>
          <div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;">
            <input type="date" id="revenueFrom" style="font-size:11px;padding:2px 4px;border-radius:6px;border:1px solid #ccc;">
            <span style="font-size:11px">עד</span>
            <input type="date" id="revenueTo" style="font-size:11px;padding:2px 4px;border-radius:6px;border:1px solid #ccc;">
            <button onclick="applyRevenuePicker()" style="font-size:11px;padding:2px 8px;border-radius:6px;background:#2e7d32;color:#fff;border:none;cursor:pointer;">הצג</button>
          </div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon"><i class="ph ph-factory"></i></div>
          <div class="stat-value" id="statProduction">—</div>
          <div class="stat-label">בתהליך ייצור</div>
        </div>
      </div>

      <div class="section-title">
        <i class="ph ph-clock-countdown"></i> פעילות אחרונה — הועברו לייצור
      </div>
      <div class="activity-wrap">
        <table class="activity-table">
          <thead>
            <tr>
              <th>קוד הזמנה</th>
              <th>רוכש</th>
              <th>מערכות</th>
              <th>סה"כ כולל מע"מ</th>
              <th>תאריך</th>
              <th>סטטוס</th>
            </tr>
          </thead>
          <tbody id="activityBody">
            <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--silver-dark);">
              <i class="ph ph-circle-notch spin"></i> טוען...
            </td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://exfdjelwyrspfspcevvm.supabase.co',
  'sb_publishable_6Yb2QjjK9jkDpvAeIZuOxA_g1KEA4ED'
);

async function requireAdmin() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return null; }
  const { data: adminRow } = await supabase
    .from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
  if (!adminRow) { window.location.href = 'dashboard.html'; return null; }
  return user;
}

(function() {
  const items = [
    { id: 'overview',  icon: 'ph-chart-bar',       label: 'סקירה כללית',    href: 'admin-overview.html' },
    { id: 'users',     icon: 'ph-users',            label: 'אישור משתמשים', href: 'admin-users.html' },
    { id: 'members',   icon: 'ph-medal',            label: 'חבר אלום',       href: 'admin-members.html' },
    { id: 'crm',       icon: 'ph-address-book',     label: 'קהילה ו-CRM',   href: 'approved-users.html' },
    { id: 'orders',    icon: 'ph-list-bullets',     label: 'הזמנות',         href: 'admin.html' },
    { id: 'quotes',    icon: 'ph-file-text',        label: 'הצעות מחיר',     href: 'admin-quotes.html' },
    { id: 'financial', icon: 'ph-currency-circle-dollar', label: 'ניהול פיננסי', href: 'admin-financial.html' },
    { id: 'settings',  icon: 'ph-gear-six',         label: 'תמחור גלובלי',  href: 'admin-settings.html' },
    { id: 'tasks',     icon: 'ph-check-square',     label: 'ניהול משימות',   href: 'admin-tasks.html' },
  ];
  const el = document.getElementById('admin-sidebar-placeholder');
  if (el) el.innerHTML = `<div class="sidebar-label">ניהול</div><ul class="admin-nav">${
    items.map(i => `<li><a href="${i.href}" class="${i.id==='overview'?'active':''}"><i class="ph ${i.icon}"></i> ${i.label}</a></li>`).join('')
  }</ul>`;
})();

async function init() {
  const user = await requireAdmin();
  if (!user) return;

  document.getElementById('adminEmail').textContent = user.email;
  document.getElementById('pageSubtitle').textContent = `שלום, ${user.email}`;

  await Promise.all([loadStats(), loadActivity()]);
}

async function loadRevenue(from, to) {
  let revenue = 0;
  if (from && to) {
    const { data } = await supabase
      .from('totals_ledger')
      .select('total_production_revenue')
      .gte('entry_date', from)
      .lte('entry_date', to);
    revenue = (data || []).reduce((s, r) => s + (r.total_production_revenue || 0), 0);
  } else {
    const today = new Date().toISOString().slice(0, 10);
    const { data } = await supabase
      .from('totals_ledger')
      .select('total_production_revenue')
      .eq('entry_date', today)
      .maybeSingle();
    revenue = data?.total_production_revenue || 0;
  }
  document.getElementById('statRevenue').textContent = '₪' + revenue.toLocaleString('he-IL');
}

async function setOrdersFilter(range, btn) {
  document.querySelectorAll('.ofb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await loadOrdersCount(range);
}
window.setOrdersFilter = setOrdersFilter;

async function loadOrdersCount(range = 'today') {
  let query = supabase.from('orders_with_names').select('id', { count:'exact', head:true });
  const now = new Date();
  if (range === 'today') {
    const start = new Date(now); start.setHours(0,0,0,0);
    const end   = new Date(now); end.setHours(23,59,59,999);
    query = query.gte('created_at', start.toISOString()).lte('created_at', end.toISOString());
  } else if (range === '7') {
    const start = new Date(now); start.setDate(start.getDate()-7);
    query = query.gte('created_at', start.toISOString());
  } else if (range === '30') {
    const start = new Date(now); start.setDate(start.getDate()-30);
    query = query.gte('created_at', start.toISOString());
  }
  const { count } = await query;
  document.getElementById('statOrders').textContent = count ?? '—';
}

async function applyRevenuePicker() {
  const from = document.getElementById('revenueFrom').value;
  const to   = document.getElementById('revenueTo').value;
  if (from && to) await loadRevenue(from, to);
}
window.applyRevenuePicker = applyRevenuePicker;

async function loadStats() {
  const [pendingRes, ordersRes] = await Promise.all([
    supabase.from('profiles').select('id', { count: 'exact', head: true }).eq('is_approved', false),
    supabase.from('orders_with_names').select('id, status')
  ]);

  document.getElementById('statPending').textContent = pendingRes.count ?? '—';

  const orders = ordersRes.data || [];
  await loadOrdersCount('today');

  const inProd = orders.filter(o => o.status === 'in_production').length;
  document.getElementById('statProduction').textContent = inProd;

  await loadRevenue();
}

async function loadActivity() {
  const ACTIVE_STATUSES = ['pending', 'technical_review', 'in_production', 'ready_for_delivery'];

  const { data, error } = await supabase
    .from('orders_with_names')
    .select('*')
    .in('status', ACTIVE_STATUSES)
    .order('updated_at', { ascending: false })
    .limit(8);

  const tbody = document.getElementById('activityBody');

  if (error || !data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="ph ph-inbox"></i><p>אין הזמנות בתהליך</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(o => {
    const sys = (o.order_data?.systems || []).length;
    const date = new Date(o.updated_at || o.created_at).toLocaleDateString('he-IL');
    const statusMap = {
      pending:              ['status-review',      'ממתין לאישור'],
      technical_review:     ['status-review',      'בבדיקה טכנית'],
      in_production:        ['status-production',  'בייצור'],
      ready_for_delivery:   ['status-production',  'מוכן למסירה'],
    };
    const [cls, label] = statusMap[o.status] || ['', o.status];

    return `<tr class="row-s-${o.status}">
      <td class="order-code">${o.order_code}</td>
      <td>${o.customer_name || o.vendor_name || '—'}</td>
      <td style="color:var(--silver-dark)">${sys} מערכת${sys !== 1 ? 'ות' : ''}</td>
      <td style="font-weight:700">₪${(o.grand_total || 0).toLocaleString()}</td>
      <td>${date}</td>
      <td><span class="status-badge ${cls}">${label}</span></td>
    </tr>`;
  }).join('');
}

init();
</script>
</body>
</html>
