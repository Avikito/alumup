<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | לוח זמנים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    .admin-wrapper { display:flex; flex:1; min-height:calc(100vh - 64px); }
    .admin-sidebar {
      width:220px; flex-shrink:0;
      background:var(--surface-dark);
      border-left:1px solid var(--border);
      padding:1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }
    .nav-badge { margin-right:auto;background:#dc2626;color:#fff;font-size:0.62rem;font-weight:800;padding:0.1rem 0.42rem;border-radius:20px;line-height:1.5;display:none; }
    .nav-badge.show { display:inline-block; }
    /* ── ACCORDION NAV GROUPS ── */
    .nav-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:0.55rem 0.75rem;border-radius:8px;font-size:0.88rem;font-weight:600;color:var(--silver-dark);cursor:pointer;transition:all 0.18s ease;user-select:none; }
    .nav-group-hdr:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .nav-group-hdr.open { color:var(--electric-blue); }
    .nav-grp-left { display:flex;align-items:center;gap:0.65rem; }
    .nav-caret { font-size:0.72rem;transition:transform 0.22s ease; }
    .nav-group-hdr.open .nav-caret { transform:rotate(180deg); }
    .nav-sub { list-style:none;flex-direction:column;gap:0.08rem;padding:0.1rem 0 0.1rem 0.9rem;margin:0; }
    .nav-sub a { font-size:0.84rem !important;padding:0.42rem 0.75rem !important; }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:1.5rem; }

    /* ── CALENDAR ── */
    .cal-layout { display:flex;gap:1rem;height:calc(100vh - 200px);min-height:500px; }
    .cal-main { flex:1;min-width:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;padding:0.85rem; }
    .cal-main .fc { font-family:'Heebo',sans-serif; }
    .cal-main .fc-toolbar-title { font-size:1rem;font-weight:800;color:#0f172a; }
    .cal-main .fc-button { font-family:'Heebo',sans-serif;font-size:0.76rem;font-weight:700;padding:0.28rem 0.65rem; }
    .cal-main .fc-button-primary { background:#2563eb;border-color:#2563eb; }
    .cal-main .fc-button-primary:hover { background:#1d4ed8;border-color:#1d4ed8; }
    .cal-main .fc-button-primary:not(:disabled).fc-button-active { background:#1e40af!important;border-color:#1e40af!important; }
    .cal-main .fc-event { border-radius:6px;font-size:0.71rem;font-weight:700;border:none;padding:2px 5px;cursor:pointer; }
    .cal-main .fc-col-header-cell-cushion { font-size:0.75rem;font-weight:700;color:#334155;text-decoration:none; }
    .cal-main .fc-daygrid-day-number { font-size:0.76rem;color:#334155;text-decoration:none; }
    .cal-main .fc-timegrid-slot-label-cushion { font-size:0.68rem;color:#94a3b8; }
    .cal-main .fc-daygrid-event { margin:1px 2px; }
    .cal-main .cal-holiday-event { font-size:0.65rem !important;font-weight:600 !important;opacity:0.88;border-radius:4px !important;padding:1px 4px !important; }
    .cal-legend { display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem; }
    .cal-legend-item { display:flex;align-items:center;gap:0.35rem;font-size:0.72rem;font-weight:600;color:#334155; }
    .cal-legend-dot { width:11px;height:11px;border-radius:3px;flex-shrink:0; }

    /* ── SIDEBAR ── */
    .cal-sidebar { width:248px;flex-shrink:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;display:flex;flex-direction:column;overflow:hidden; }
    .cal-sb-header { padding:0.7rem 1rem;border-bottom:1px solid #e2e8f0;font-size:0.76rem;font-weight:800;color:#2563eb;background:#f8faff;display:flex;align-items:center;gap:0.4rem;flex-shrink:0; }
    .cal-sb-scroll { flex:1;overflow-y:auto;padding:0.75rem;display:flex;flex-direction:column;gap:0.55rem; }
    .cal-sb-field { display:flex;flex-direction:column;gap:0.22rem; }
    .cal-sb-field label { font-size:0.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.4px; }
    .cal-sb-field input,.cal-sb-field select,.cal-sb-field textarea { padding:0.38rem 0.6rem;border:1.5px solid #e2e8f0;border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.82rem;color:#334155;background:#f8fafc;outline:none;transition:border-color 0.15s;width:100%;box-sizing:border-box; }
    .cal-sb-field input:focus,.cal-sb-field select:focus,.cal-sb-field textarea:focus { border-color:#2563eb;background:#fff; }
    .cal-sb-field textarea { resize:vertical;min-height:52px; }
    .cal-sb-time-row { display:flex;align-items:center;gap:0.3rem; }
    .cal-sb-time-row input { flex:1;min-width:0; }
    .cal-sb-sep { color:#94a3b8;font-size:0.75rem;flex-shrink:0; }
    .cal-sb-save-btn { width:100%;padding:0.52rem;background:#2563eb;color:#fff;border:none;border-radius:9px;font-family:'Heebo',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.4rem;transition:background 0.15s;margin-top:0.2rem; }
    .cal-sb-save-btn:hover { background:#1d4ed8; }
    .cal-sb-divider { border:none;border-top:1px solid #f1f5f9;margin:0.4rem 0; }
    .cal-sb-day-title { font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:#94a3b8;margin-bottom:0.35rem; }
    .cal-sb-ev { padding:0.35rem 0.55rem;border-radius:7px;font-size:0.74rem;font-weight:700;color:#fff;margin-bottom:0.22rem;display:flex;align-items:center;gap:0.35rem;cursor:pointer;transition:opacity 0.12s; }
    .cal-sb-ev:hover { opacity:0.85; }
    .cal-sb-empty { font-size:0.76rem;color:#94a3b8;text-align:center;padding:0.8rem 0; }

    /* ── MODALS ── */
    .b-overlay { display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px); }
    .b-modal-box { background:#fff;border-radius:18px;padding:1.75rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:b-popUp 0.2s ease;box-shadow:0 20px 60px rgba(15,23,42,0.2); }
    @keyframes b-popUp { from{opacity:0;transform:translateY(16px) scale(0.97)} to{opacity:1;transform:none} }
    .b-modal-title { font-size:1rem;font-weight:900;color:#0f172a;margin-bottom:1.25rem; }
    .b-modal-close { position:absolute;top:1rem;left:1rem;background:#f1f5f9;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#64748b;font-size:0.9rem; }
    .b-modal-close:hover { background:#e2e8f0;color:#0f172a; }
    .b-form-field { margin-bottom:0.9rem; }
    .b-form-field label { display:block;font-size:0.78rem;font-weight:700;color:#0f172a;margin-bottom:5px; }
    .b-form-field input,.b-form-field select { width:100%;padding:0.6rem 0.85rem;border:1.5px solid #e2e8f0;border-radius:9px;font-family:'Heebo',sans-serif;font-size:0.88rem;color:#0f172a;outline:none;transition:border-color 0.15s;box-sizing:border-box; }
    .b-form-field input:focus,.b-form-field select:focus { border-color:#2563eb; }
    .b-form-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .btn-primary { background:#2563eb;color:#fff;border:none;border-radius:8px;padding:0.45rem 1rem;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s; }
    .btn-primary:hover { background:#1d4ed8; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;">
        <div>
          <div class="page-title" style="margin-bottom:0.15rem;"><i class="ph ph-calendar-dots" style="color:#2563eb;margin-left:0.4rem;"></i>לוח זמנים</div>
          <div class="page-subtitle" style="margin-bottom:0;">ראיונות, פגישות ואירועים עסקיים</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.6rem;flex-shrink:0;">
          <button id="cal-holidays-btn" onclick="calToggleHolidays()" style="display:flex;align-items:center;gap:0.4rem;background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0;border-radius:9px;padding:0.5rem 0.9rem;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;">
            <i class="ph ph-star"></i> חגים ומועדים
          </button>
          <button id="cal-color-btn" onclick="calToggleColors()" style="display:flex;align-items:center;gap:0.4rem;background:#eff6ff;color:#2563eb;border:1.5px solid #93c5fd;border-radius:9px;padding:0.5rem 0.9rem;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;">
            <i class="ph ph-palette"></i> צבעים
          </button>
          <button onclick="calQuickAdd()" style="display:flex;align-items:center;gap:0.4rem;background:#2563eb;color:#fff;border:none;border-radius:9px;padding:0.55rem 1.1rem;font-family:'Heebo',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;">
            <i class="ph ph-plus"></i> אירוע חדש
          </button>
        </div>
      </div>

      <div class="cal-legend">
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#2563eb;"></span>ראיון</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#7c3aed;"></span>מבחן מעשי</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#15803d;"></span>פתיחת מחזור</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#d97706;"></span>מחזור פתוח רשמית</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#0891b2;"></span>פגישה</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#0f766e;"></span>שיעור</div>
        <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#64748b;"></span>אחר</div>
        <div id="cal-legend-holidays" style="display:none;contents:'';">
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#1e40af;"></span>יהודי</div>
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#dc2626;"></span>לאומי/זיכרון</div>
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#059669;"></span>מוסלמי</div>
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#7c3aed;opacity:0.6;"></span>נוצרי</div>
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#d97706;opacity:0.7;"></span>דרוזי</div>
        </div>
      </div>

      <div class="cal-layout">
        <div class="cal-sidebar">
          <div class="cal-sb-header"><i class="ph ph-calendar-plus"></i> הוסף לוז</div>
          <div class="cal-sb-scroll">
            <div class="cal-sb-field">
              <label>סוג</label>
              <select id="csb-type">
                <option value="meeting">פגישה</option>
                <option value="interview">ראיון</option>
                <option value="practical_exam">מבחן מעשי</option>
                <option value="course_session">שיעור</option>
                <option value="batch_open">פתיחת מחזור</option>
                <option value="other">אחר</option>
              </select>
            </div>
            <div class="cal-sb-field">
              <label>כותרת</label>
              <input type="text" id="csb-title" placeholder="כותרת האירוע...">
            </div>
            <div class="cal-sb-field">
              <label>תאריך</label>
              <input type="date" id="csb-date">
            </div>
            <div class="cal-sb-field">
              <label>שעות</label>
              <div class="cal-sb-time-row">
                <input type="time" id="csb-start" value="09:00">
                <span class="cal-sb-sep">–</span>
                <input type="time" id="csb-end" value="10:00">
              </div>
            </div>
            <div class="cal-sb-field">
              <label>מיקום</label>
              <input type="text" id="csb-location" placeholder="לדוג׳: תל אביב">
            </div>
            <div class="cal-sb-field">
              <label>הערות</label>
              <textarea id="csb-notes" placeholder="הערות..."></textarea>
            </div>
            <button class="cal-sb-save-btn" onclick="calSidebarSave()">
              <i class="ph ph-check"></i> הוסף אירוע
            </button>
            <hr class="cal-sb-divider">
            <div id="csb-day-section" style="display:none;">
              <div class="cal-sb-day-title" id="csb-day-label">אירועי היום</div>
              <div id="csb-day-list"></div>
            </div>
          </div>
        </div>
        <div class="cal-main">
          <div id="cal-el" style="height:100%;"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- QUICK-ADD MODAL -->
  <div class="b-overlay" id="cal-quick-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="b-modal-box" style="max-width:480px;">
      <button class="b-modal-close" onclick="document.getElementById('cal-quick-modal').style.display='none'"><i class="ph ph-x"></i></button>
      <div class="b-modal-title"><i class="ph ph-calendar-plus" style="color:#2563eb;"></i> אירוע חדש</div>
      <div class="b-form-row">
        <div class="b-form-field">
          <label>סוג אירוע</label>
          <select id="cal-q-type">
            <option value="meeting">פגישה</option>
            <option value="interview">ראיון</option>
            <option value="practical_exam">מבחן מעשי</option>
            <option value="course_session">שיעור</option>
            <option value="other">אחר</option>
          </select>
        </div>
        <div class="b-form-field">
          <label>תאריך</label>
          <input type="date" id="cal-q-date">
        </div>
      </div>
      <div class="b-form-row">
        <div class="b-form-field">
          <label>שעה</label>
          <input type="time" id="cal-q-time" value="09:00">
        </div>
        <div class="b-form-field">
          <label>קיבולת</label>
          <input type="number" id="cal-q-capacity" value="10" min="1" max="200">
        </div>
      </div>
      <div class="b-form-field">
        <label>מיקום</label>
        <input type="text" id="cal-q-location" placeholder="לדוג׳: תל אביב">
      </div>
      <div class="b-form-field">
        <label>הערות</label>
        <input type="text" id="cal-q-notes" placeholder="הערות אופציונליות...">
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" onclick="calCreateEvent()">
        <i class="ph ph-check"></i> צור אירוע
      </button>
    </div>
  </div>

  <!-- EVENT DETAIL MODAL -->
  <div class="b-overlay" id="cal-detail-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="b-modal-box" style="max-width:520px;">
      <button class="b-modal-close" onclick="document.getElementById('cal-detail-modal').style.display='none'"><i class="ph ph-x"></i></button>
      <div class="b-modal-title" id="cal-detail-title">פרטי אירוע</div>
      <div id="cal-detail-body"></div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="b-overlay" id="cal-edit-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="b-modal-box" style="max-width:480px;">
      <button class="b-modal-close" onclick="document.getElementById('cal-edit-modal').style.display='none'"><i class="ph ph-x"></i></button>
      <div class="b-modal-title"><i class="ph ph-pencil" style="color:#2563eb;"></i> עריכת אירוע</div>
      <input type="hidden" id="cal-edit-id">
      <div class="b-form-row">
        <div class="b-form-field">
          <label>סוג אירוע</label>
          <select id="cal-edit-type">
            <option value="meeting">פגישה</option>
            <option value="interview">ראיון</option>
            <option value="practical_exam">מבחן מעשי</option>
            <option value="course_session">שיעור</option>
            <option value="batch_open">פתיחת מחזור</option>
            <option value="other">אחר</option>
          </select>
        </div>
        <div class="b-form-field">
          <label>תאריך</label>
          <input type="date" id="cal-edit-date">
        </div>
      </div>
      <div class="b-form-row">
        <div class="b-form-field">
          <label>שעה</label>
          <input type="time" id="cal-edit-time">
        </div>
        <div class="b-form-field">
          <label>קיבולת</label>
          <input type="number" id="cal-edit-capacity" min="1" max="200">
        </div>
      </div>
      <div class="b-form-field">
        <label>מיקום</label>
        <input type="text" id="cal-edit-location">
      </div>
      <div class="b-form-field">
        <label>הערות</label>
        <input type="text" id="cal-edit-notes">
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" onclick="calSaveEdit()">
        <i class="ph ph-check"></i> שמור שינויים
      </button>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="b-overlay" id="cal-delete-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="b-modal-box" style="max-width:400px;">
      <button class="b-modal-close" onclick="document.getElementById('cal-delete-modal').style.display='none'"><i class="ph ph-x"></i></button>
      <div class="b-modal-title" style="color:#dc2626;"><i class="ph ph-trash" style="color:#dc2626;"></i> מחיקת אירוע</div>
      <input type="hidden" id="cal-delete-id">
      <div style="font-size:0.88rem;color:#475569;margin-bottom:1rem;line-height:1.6;">
        פעולה זו <strong>בלתי הפיכה</strong>.<br>
        לאישור המחיקה הקלד את קוד האימות:
        <div style="margin-top:0.5rem;padding:0.5rem 0.75rem;background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;font-size:1.1rem;font-weight:800;color:#dc2626;letter-spacing:0.15em;text-align:center;" id="cal-delete-expected-code">—</div>
      </div>
      <div class="b-form-field" style="margin-bottom:1rem;">
        <label>קוד אימות</label>
        <input type="text" id="cal-delete-code-input" placeholder="הקלד את הקוד..." style="text-align:center;font-size:1rem;font-weight:700;letter-spacing:0.1em;">

// ── LOAD & INIT ──
async function loadCalDays() {
  const { data, error } = await supabase.from('admin_events').select('*').order('date', { ascending: true });
  if (error) { console.error('calendar load error:', error); return; }
  calDays = data || [];
}

async function calInit() {
  await loadCalDays();
  const el = document.getElementById('cal-el');
  if (!el) return;

  if (calInstance) { calInstance.destroy(); calInstance = null; }

  calInstance = new FullCalendar.Calendar(el, {
    locale:       'he',
    direction:    'rtl',
    initialView:  'dayGridMonth',
    height:       '100%',
    headerToolbar: { start:'prev,next today', center:'title', end:'dayGridMonth,timeGridWeek,timeGridDay' },
    buttonText: { today:'היום', month:'חודש', week:'שבוע', day:'יום' },
    events: calBuildEvents(),
    editable: false,
    eventClick:  calEventClick,
    dateClick:   calDateClick,
    selectable:  true,
    selectMirror: true,
    select:      calSelectRange,
    eventDidMount: function(info) {
      const cap = info.event.extendedProps.capacity || '';
      const cnt = info.event.extendedProps.assignedCount || 0;
      if (cap) info.el.title = `${CAL_TYPE_LABELS[info.event.extendedProps.type] || ''} · ${cnt}/${cap} משתתפים`;
    },
  });

  calInstance.render();

  const todayStr = new Date().toISOString().substring(0,10);
  const csbDate = document.getElementById('csb-date');
  if (csbDate && !csbDate.value) csbDate.value = todayStr;
}

function calBuildEvents() {
  const events = [];

  if (calShowHolidays) {
    CAL_HOLIDAYS.forEach(h => {
      const s = CAL_HOL_STYLE[h.cat] || { bg:'#f1f5f9', text:'#475569', border:'#e2e8f0' };
      events.push({
        id: 'hol-' + h.date + '-' + h.cat,
        title: h.title, start: h.date, allDay: true,
        color: s.bg, textColor: s.text, borderColor: s.border,
        extendedProps: { type:'holiday', cat: h.cat, isHoliday: true },
        editable: false, classNames: ['cal-holiday-event'],
      });
    });
  }

  const colOf = (type) => calColorMode ? (CAL_TYPE_COLORS[type] || '#64748b') : '#64748b';

  calDays.forEach(d => {
    events.push({
      id:    'pday-' + d.id,
      title: `${CAL_TYPE_LABELS[d.type] || d.type}${d.location ? ' · ' + d.location : ''}`,
      start: d.time ? d.date + 'T' + d.time : d.date,
      color: colOf(d.type),
      extendedProps: { type: d.type, sourceType: 'pday', sourceId: d.id, capacity: d.capacity, assignedCount: 0, location: d.location, notes: d.notes },
    });
  });

  return events;
}

function calEventClick(info) {
  const p = info.event.extendedProps;
  const modal = document.getElementById('cal-detail-modal');
  const title = document.getElementById('cal-detail-title');
  const body  = document.getElementById('cal-detail-body');
  if (!modal) return;

  title.textContent = info.event.title;

  if (p.isHoliday) {
    const s = CAL_HOL_STYLE[p.cat] || {};
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:0.6rem;padding:0.75rem 1rem;border-radius:10px;background:${s.bg||'#f1f5f9'};border:1.5px solid ${s.border||'#e2e8f0'};">
        <i class="ph ph-star" style="font-size:1.3rem;color:${s.text||'#475569'};"></i>
        <div>
          <div style="font-size:0.85rem;font-weight:700;color:${s.text||'#334155'};">${info.event.title}</div>
          <div style="font-size:0.75rem;color:#64748b;margin-top:0.2rem;">${CAL_HOL_CAT_LABEL[p.cat]||''}</div>
        </div>
      </div>
      <div style="font-size:0.8rem;color:#64748b;margin-top:0.85rem;text-align:center;">
        ${new Date(info.event.start).toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}
      </div>`;
    modal.style.display = 'flex';
    return;
  }

  const d = calDays.find(x => x.id === p.sourceId);
  body.innerHTML = `
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem;">
      <span style="background:#eff6ff;color:#2563eb;border-radius:6px;padding:0.2rem 0.6rem;font-size:0.78rem;font-weight:700;">${CAL_TYPE_LABELS[p.type]||p.type}</span>
      ${p.location ? `<span style="background:#f1f5f9;color:#475569;border-radius:6px;padding:0.2rem 0.6rem;font-size:0.78rem;">${p.location}</span>` : ''}
    </div>
    <div style="font-size:0.82rem;color:#475569;margin-bottom:0.5rem;">
      <strong>תאריך:</strong> ${new Date(info.event.start).toLocaleDateString('he-IL')}${d?.time ? ' · ' + d.time : ''}
    </div>
    <div style="font-size:0.82rem;color:#475569;margin-bottom:0.5rem;"><strong>קיבולת:</strong> ${p.capacity||'—'}</div>
    ${d?.notes ? `<div style="font-size:0.8rem;color:#64748b;margin-bottom:0.5rem;"><strong>הערות:</strong> ${d.notes}</div>` : ''}
    <div style="display:flex;gap:0.5rem;margin-top:1rem;padding-top:0.85rem;border-top:1px solid #f1f5f9;">
      <button onclick="calOpenEdit('${p.sourceId}')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.5rem;background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;">
        <i class="ph ph-pencil"></i> ערוך
      </button>
      <button onclick="calOpenDelete('${p.sourceId}')" style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.35rem;padding:0.5rem;background:#fff5f5;color:#dc2626;border:1.5px solid #fecaca;border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;">
        <i class="ph ph-trash"></i> מחק
      </button>
    </div>`;
  modal.style.display = 'flex';
}

function calDateClick(info) {
  const dateInput = document.getElementById('csb-date');
  if (dateInput) dateInput.value = info.dateStr;
  if (calInstance) calInstance.changeView('timeGridDay', info.dateStr);
  calSidebarPopulateDay(info.dateStr);
}

function calSelectRange(info) {
  const dateInput  = document.getElementById('csb-date');
  const startInput = document.getElementById('csb-start');
  const endInput   = document.getElementById('csb-end');
  if (dateInput)  dateInput.value  = info.startStr.substring(0, 10);
  if (startInput) startInput.value = info.startStr.substring(11, 16) || '09:00';
  if (endInput)   endInput.value   = info.endStr.substring(11, 16)   || '10:00';
  calSidebarPopulateDay(info.startStr.substring(0, 10));
}

function calSidebarPopulateDay(dateStr) {
  const section = document.getElementById('csb-day-section');
  const label   = document.getElementById('csb-day-label');
  const list    = document.getElementById('csb-day-list');
  if (!section || !list) return;
  const d = new Date(dateStr);
  if (label) label.textContent = d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
  const events = calInstance ? calInstance.getEvents().filter(e => (e.startStr||'').startsWith(dateStr) && !e.extendedProps?.isHoliday) : [];
  if (events.length === 0) {
    list.innerHTML = `<div class="cal-sb-empty">אין אירועים ביום זה</div>`;
  } else {
    list.innerHTML = events.map(e => {
      const col = e.backgroundColor || CAL_TYPE_COLORS[e.extendedProps?.type] || '#64748b';
      const time = e.startStr ? e.startStr.substring(11,16) : '';
      return `<div class="cal-sb-ev" style="background:${col};" onclick="document.getElementById('cal-detail-modal').style.display='none';calEventClick({event:calInstance.getEventById('${e.id}')})">
        ${time ? `<span style="font-size:0.68rem;opacity:0.85;">${time}</span>` : ''}
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.title}</span>
      </div>`;
    }).join('');
  }
  section.style.display = 'block';
}

window.calSidebarSave = async function() {
  const type     = document.getElementById('csb-type')?.value;
  const title    = document.getElementById('csb-title')?.value?.trim() || '';
  const date     = document.getElementById('csb-date')?.value;
  const start    = document.getElementById('csb-start')?.value || '09:00';
  const location = document.getElementById('csb-location')?.value?.trim() || '';
  const notes    = document.getElementById('csb-notes')?.value?.trim() || '';
  if (!date) { alert('יש לבחור תאריך'); return; }
  const btn = document.querySelector('.cal-sb-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר...'; }
  try {
    const { data, error } = await supabase.from('admin_events').insert({
      type, date, time: start, capacity: 1,
      location, notes: (title ? title + (notes ? ' | ' + notes : '') : notes),
    }).select().single();
    if (error) throw error;
    calDays.push(data);
    if (document.getElementById('csb-title'))    document.getElementById('csb-title').value = '';
    if (document.getElementById('csb-location')) document.getElementById('csb-location').value = '';
    if (document.getElementById('csb-notes'))    document.getElementById('csb-notes').value = '';
    if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
    if (date) calSidebarPopulateDay(date);
  } catch(e) {
    alert('שגיאה: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ph ph-check"></i> הוסף אירוע'; }
  }
};

// ── QUICK ADD ──
window.calQuickAdd = function() {
  const modal = document.getElementById('cal-quick-modal');
  if (!modal) return;
  const dateInput = document.getElementById('cal-q-date');
  if (dateInput && !dateInput.value) dateInput.value = new Date().toISOString().substring(0,10);
  modal.style.display = 'flex';
};

window.calCreateEvent = async function() {
  const type     = document.getElementById('cal-q-type')?.value;
  const date     = document.getElementById('cal-q-date')?.value;
  const time     = document.getElementById('cal-q-time')?.value;
  const capacity = parseInt(document.getElementById('cal-q-capacity')?.value) || 10;
  const location = document.getElementById('cal-q-location')?.value?.trim() || '';
  const notes    = document.getElementById('cal-q-notes')?.value?.trim() || '';
  if (!date) { alert('יש לבחור תאריך'); return; }
  const { data, error } = await supabase.from('admin_events')
    .insert({ type, date, time, capacity, location, notes })
    .select().single();
  if (error) { alert('שגיאה ביצירת אירוע: ' + error.message); return; }
  calDays.push(data);
  document.getElementById('cal-quick-modal').style.display = 'none';
  ['cal-q-date','cal-q-location','cal-q-notes'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
};

// ── EDIT ──
window.calOpenEdit = function(sourceId) {
  document.getElementById('cal-detail-modal').style.display = 'none';
  const d = calDays.find(x => x.id === sourceId);
  if (!d) return;
  document.getElementById('cal-edit-id').value       = sourceId;
  document.getElementById('cal-edit-type').value     = d.type || 'meeting';
  document.getElementById('cal-edit-date').value     = d.date || '';
  document.getElementById('cal-edit-time').value     = d.time || '';
  document.getElementById('cal-edit-capacity').value = d.capacity || 1;
  document.getElementById('cal-edit-location').value = d.location || '';
  document.getElementById('cal-edit-notes').value    = d.notes || '';
  document.getElementById('cal-edit-modal').style.display = 'flex';
};

window.calSaveEdit = async function() {
  const sourceId = document.getElementById('cal-edit-id')?.value;
  if (!sourceId) return;
  const type     = document.getElementById('cal-edit-type')?.value;
  const date     = document.getElementById('cal-edit-date')?.value;
  const time     = document.getElementById('cal-edit-time')?.value;
  const capacity = parseInt(document.getElementById('cal-edit-capacity')?.value) || 1;
  const location = document.getElementById('cal-edit-location')?.value?.trim() || '';
  const notes    = document.getElementById('cal-edit-notes')?.value?.trim() || '';
  const btn = document.getElementById('cal-edit-modal')?.querySelector('button.btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר...'; }
  try {
    const { error } = await supabase.from('admin_events')
      .update({ type, date, time, capacity, location, notes })
      .eq('id', sourceId);
    if (error) throw error;
    const idx = calDays.findIndex(x => x.id === sourceId);
    if (idx !== -1) calDays[idx] = { ...calDays[idx], type, date, time, capacity, location, notes };
    document.getElementById('cal-edit-modal').style.display = 'none';
    if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
  } catch(e) {
    alert('שגיאה בשמירה: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ph ph-check"></i> שמור שינויים'; }
  }
};

// ── DELETE ──
window.calOpenDelete = function(sourceId) {
  document.getElementById('cal-detail-modal').style.display = 'none';
  document.getElementById('cal-delete-id').value = sourceId;
  document.getElementById('cal-delete-code-input').value = '';
  document.getElementById('cal-delete-code-input').style.border = '';
  _calDeleteCode = String(Math.floor(1000 + Math.random() * 9000));
  document.getElementById('cal-delete-expected-code').textContent = _calDeleteCode;
  document.getElementById('cal-delete-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('cal-delete-code-input')?.focus(), 100);
};

window.calConfirmDelete = async function() {
  const sourceId  = document.getElementById('cal-delete-id')?.value;
  const inputCode = document.getElementById('cal-delete-code-input')?.value?.trim();
  if (!sourceId) return;
  if (inputCode !== _calDeleteCode) {
    document.getElementById('cal-delete-code-input').style.border = '2px solid #dc2626';
    return;
  }
  const btn = document.getElementById('cal-delete-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'מוחק...'; }
  try {
    const { error } = await supabase.from('admin_events').delete().eq('id', sourceId);
    if (error) throw error;
    calDays = calDays.filter(x => x.id !== sourceId);
    document.getElementById('cal-delete-modal').style.display = 'none';
    if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
  } catch(e) {
    alert('שגיאה במחיקה: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ph ph-trash"></i> אשר מחיקה'; }
  }
};

// ── TOGGLE HOLIDAYS / COLORS ──
window.calToggleHolidays = function() {
  calShowHolidays = !calShowHolidays;
  const btn = document.getElementById('cal-holidays-btn');
  const leg = document.getElementById('cal-legend-holidays');
  if (btn) {
    btn.style.background  = calShowHolidays ? '#eff6ff' : '#f1f5f9';
    btn.style.color       = calShowHolidays ? '#2563eb' : '#475569';
    btn.style.borderColor = calShowHolidays ? '#93c5fd' : '#e2e8f0';
  }
  if (leg) leg.style.display = calShowHolidays ? 'contents' : 'none';
  if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
};

window.calToggleColors = function() {
  calColorMode = !calColorMode;
  const btn = document.getElementById('cal-color-btn');
  if (btn) {
    btn.style.background  = calColorMode ? '#eff6ff' : '#f1f5f9';
    btn.style.color       = calColorMode ? '#2563eb' : '#475569';
    btn.style.borderColor = calColorMode ? '#93c5fd' : '#e2e8f0';
    btn.innerHTML = calColorMode ? '<i class="ph ph-palette"></i> צבעים' : '<i class="ph ph-circle-half"></i> גוון רגיל';
  }
  if (calInstance) { calInstance.removeAllEvents(); calBuildEvents().forEach(e => calInstance.addEvent(e)); }
};

calInit();
</script>
</body>
</html>
