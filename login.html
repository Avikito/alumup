<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALUM-IL | התחברות למערכת</title>
    <!-- Google Fonts: Heebo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <!-- Header: Minimalist -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img src="logo.PNG" alt="ALUM-IL" style="height:38px;display:block;">
            </a>
        </div>
    </header>

    <main class="auth-page">
        <!-- Abstract background styling -->
        <div class="hero-abstract-bg">
            <div class="glow-orb primary-orb" style="top: 20%; right: 10%;"></div>
            <div class="glow-orb secondary-orb" style="bottom: 10%; left: 10%;"></div>
        </div>

        <div class="container">
            <div class="auth-container" style="max-width: 450px;">
                <div class="auth-header">
                    <i class="ph ph-shield-check auth-icon"></i>
                    <h1 class="auth-title">כניסה למערכת</h1>
                    <p class="auth-subtitle">הזן את פרטי הגישה שלך</p>
                </div>

                <form id="loginForm" novalidate onsubmit="handleLogin(event)">
                    <!-- Google Login -->
                    <button type="button" class="btn btn-google btn-large" onclick="handleGoogleLogin()">
                        <i class="ph-fill ph-google-logo"></i> התחברות מהירה עם Google
                    </button>

                    <div class="auth-divider">
                        <span>או כניסה עם דוא"ל</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">כתובת דוא"ל / שם משתמש</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@company.co.il">
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="password">סיסמה</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        <div style="text-align: left; margin-top: 5px;">
                            <a href="#" style="color: var(--silver-dark); font-size: 0.85rem;">שכחת סיסמה?</a>
                        </div>
                    </div>

                    <div id="loginError"
                        style="color: #ff4d4d; margin-bottom: 1rem; text-align: center; display: none; font-weight: 500;">
                    </div>

                    <button type="submit" class="btn btn-primary btn-large btn-block">
                        הכנס לחשבון <i class="ph ph-arrow-left"></i>
                    </button>

                    <div class="auth-footer">
                        עדיין אין לך חשבון? <a href="register.html">הירשם עכשיו</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://exfdjelwyrspfspcevvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6Yb2QjjK9jkDpvAeIZuOxA_g1KEA4ED';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('loginError');

            console.log('Attempting login with email:', email);

            if (!email || !password) {
                console.warn('Validation failed: Missing email or password.');
                errorMessage.textContent = 'יש להזין דוא"ל וסיסמה.';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                console.log('Sending signInWithPassword request to Supabase...');
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    console.error('Supabase authentication error:', error.message);
                    errorMessage.textContent = 'שגיאה: ' + error.message;
                    errorMessage.style.display = 'block';
                } else {
                    console.log('Login successful! Redirecting to dashboard...', data);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error('Unexpected error during Supabase login:', err);
                errorMessage.textContent = 'אירעה שגיאה. אנא נסה שוב מאוחר יותר.';
                errorMessage.style.display = 'block';
            }
        }

        async function handleGoogleLogin() {
            try {
                console.log('Initiating Google OAuth login flow...');
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });

                if (error) {
                    console.error('Google OAuth initialization error:', error.message);
                    const errorMessage = document.getElementById('loginError');
                    errorMessage.textContent = 'שגיאת התחברות עם Google: ' + error.message;
                    errorMessage.style.display = 'block';
                } else {
                    console.log('Google OAuth flow started successfully.', data);
                }
            } catch (err) {
                console.error('Unexpected OAuth Error:', err);
            }
        }

        // Attach purely to the window scope so inline ONCLICK/ONSUBMIT HTML bindings work within type="module"
        window.handleLogin = handleLogin;
        window.handleGoogleLogin = handleGoogleLogin;
    </script>
</body>

</html>
