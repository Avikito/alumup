<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | ניהול הצעות מחיר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .admin-wrapper { display: flex; flex: 1; min-height: calc(100vh - 64px); }

    .admin-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface-dark);
      border-left: 1px solid var(--border);
      padding: 1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);cursor:pointer;
      transition:all 0.18s ease;text-decoration:none;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }
    /* ── ACCORDION NAV GROUPS ── */
    .nav-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:0.55rem 0.75rem;border-radius:8px;font-size:0.88rem;font-weight:600;color:var(--silver-dark);cursor:pointer;transition:all 0.18s ease;user-select:none; }
    .nav-group-hdr:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .nav-group-hdr.open { color:var(--electric-blue); }
    .nav-grp-left { display:flex;align-items:center;gap:0.65rem; }
    .nav-caret { font-size:0.72rem;transition:transform 0.22s ease; }
    .nav-group-hdr.open .nav-caret { transform:rotate(180deg); }
    .nav-sub { list-style:none;flex-direction:column;gap:0.08rem;padding:0.1rem 0 0.1rem 0.9rem;margin:0; }
    .nav-sub a { font-size:0.84rem !important;padding:0.42rem 0.75rem !important; }

    .admin-content { flex:1;padding:2rem;overflow-y:auto; }
    .page-title { font-size:1.4rem;font-weight:800;color:var(--industrial-silver);margin-bottom:0.4rem; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-bottom:1.5rem; }

    .filter-bar { display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap; }
    .filter-btn {
      padding:0.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);
      background:var(--surface-dark);font-size:0.82rem;font-weight:600;
      color:var(--silver-dark);cursor:pointer;transition:all 0.18s ease;
      font-family:'Heebo',sans-serif;
    }
    .filter-btn:hover { border-color:var(--electric-blue);color:var(--electric-blue); }
    .filter-btn.active { border-color:var(--electric-blue);background:var(--blue-dim);color:var(--electric-blue); }
    .search-input {
      padding:0.4rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;
      font-family:'Heebo',sans-serif;font-size:0.88rem;color:var(--industrial-silver);
      background:var(--surface-dark);min-width:220px;
    }
    .search-input:focus { outline:none;border-color:var(--electric-blue); }

    .quotes-table-wrap { overflow-x:auto;border-radius:12px;border:1px solid var(--border); }
    .quotes-table { width:100%;border-collapse:collapse;font-size:0.88rem; }
    .quotes-table th {
      background:var(--surface-elevated,#f7f9fd);padding:0.75rem 1rem;
      text-align:right;font-size:0.75rem;font-weight:700;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);
    }
    .quotes-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .quotes-table tr:last-child td { border-bottom:none; }
    .quotes-table tr:hover td { background:var(--blue-dim); }

    .status-badge {
      display:inline-flex;align-items:center;gap:0.3rem;padding:0.22rem 0.65rem;
      border-radius:20px;font-size:0.75rem;font-weight:700;white-space:nowrap;
    }
    .status-draft     { background:rgba(196,124,0,0.1);  color:#a06000;border:1px solid rgba(196,124,0,0.25); }
    .status-sent      { background:rgba(26,95,170,0.1);  color:var(--electric-blue);border:1px solid rgba(26,95,170,0.25); }
    .status-approved  { background:rgba(22,163,74,0.1);  color:#16a34a;border:1px solid rgba(22,163,74,0.25); }
    .status-rejected  { background:rgba(220,38,38,0.1);  color:#dc2626;border:1px solid rgba(220,38,38,0.25); }

    .quote-code-cell { font-weight:700;color:var(--electric-blue);font-size:0.82rem; }
    .price-cell { font-weight:700; }

    .empty-state { text-align:center;padding:3rem;color:var(--silver-dark); }
    .empty-state i { font-size:2.5rem;display:block;margin-bottom:0.5rem;opacity:0.3; }

    .quotes-count { font-size:0.82rem;color:var(--silver-dark);margin-bottom:0.75rem; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite;display:inline-block; }

    /* Detail panel */
    .detail-panel-overlay {
      position:fixed;inset:0;background:rgba(10,20,40,0.35);
      z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s ease;
    }
    .detail-panel-overlay.open { opacity:1;pointer-events:all; }
    .detail-panel {
      position:fixed;top:0;left:0;height:100%;width:100%;max-width:520px;
      background:var(--surface-dark);box-shadow:-8px 0 40px rgba(10,20,60,0.15);
      overflow-y:auto;transform:translateX(-100%);transition:transform 0.25s ease;
      padding:1.5rem;
    }
    .detail-panel-overlay.open .detail-panel { transform:translateX(0); }
    .detail-hdr { display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem; }
    .detail-title { font-size:1rem;font-weight:800;color:var(--industrial-silver); }
    .btn-close-panel { background:none;border:none;cursor:pointer;font-size:1.25rem;color:var(--silver-dark); }

    .detail-card { background:var(--surface-elevated,#f7f9fd);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem; }
    .detail-card-title { font-size:0.82rem;font-weight:700;color:var(--electric-blue);margin-bottom:0.75rem; }
    .detail-grid { display:grid;grid-template-columns:1fr 1fr;gap:0.35rem 1rem; }
    .detail-item { display:flex;flex-direction:column; }
    .detail-key { font-size:0.7rem;color:var(--silver-dark); }
    .detail-val { font-size:0.85rem;font-weight:600;color:var(--industrial-silver); }
    .config-section { margin-top:0.5rem; }
    .config-row { display:flex;justify-content:space-between;font-size:0.82rem;padding:0.3rem 0;border-bottom:1px solid var(--border); }
    .config-row:last-child { border-bottom:none; }
    .config-key { color:var(--silver-dark); }
    .config-val { font-weight:600;color:var(--industrial-silver); }
    .grand-total { display:flex;justify-content:space-between;font-size:1rem;font-weight:800;color:var(--electric-blue);padding:0.6rem 0;border-top:2px solid var(--border);margin-top:0.5rem; }

    .status-select {
      padding:0.3rem 0.65rem;border:1.5px solid var(--border);border-radius:7px;
      font-family:'Heebo',sans-serif;font-size:0.82rem;color:var(--industrial-silver);
      background:var(--surface-dark);cursor:pointer;transition:border-color 0.18s;
    }
    .status-select:focus { outline:none;border-color:var(--electric-blue); }
    .save-indicator { font-size:0.75rem;color:var(--silver-dark);margin-top:0.2rem;height:14px; }
    .save-ok { color:#16a34a; }
    .save-err { color:#dc2626; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
      <button onclick="handleLogout()" style="display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.9rem;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.85rem;font-weight:600;color:var(--silver-dark);cursor:pointer;transition:all 0.18s;">
        <i class="ph ph-sign-out"></i> יציאה
      </button>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div class="page-title">הצעות מחיר</div>
      <div class="page-subtitle" id="pageSubtitle">טוען...</div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all')">הכל</button>
        <button class="filter-btn" onclick="setFilter('draft')">טיוטה</button>
        <button class="filter-btn" onclick="setFilter('sent')">נשלח</button>
        <button class="filter-btn" onclick="setFilter('approved')">אושר</button>
        <button class="filter-btn" onclick="setFilter('rejected')">נדחה</button>
        <input class="search-input" type="text" placeholder="חיפוש לפי קוד / שם..." id="searchInput" oninput="renderTable()">
      </div>

      <div class="quotes-count" id="quotesCount"></div>
      <div class="quotes-table-wrap">
        <table class="quotes-table">
          <thead>
            <tr>
              <th>קוד הצעה</th>
              <th>לקוח</th>
              <th>מייל</th>
              <th>תאריך</th>
              <th>סכום כולל מע"מ</th>
              <th>סטטוס</th>
              <th>פירוט</th>
            </tr>
          </thead>
          <tbody id="quotesTableBody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--silver-dark);">
              <i class="ph ph-circle-notch spin"></i> טוען הצעות מחיר...
            </td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-panel" onclick="event.stopPropagation()">
      <div class="detail-hdr">
        <div class="detail-title" id="detailTitle">פירוט הצעה</div>
        <button class="btn-close-panel" onclick="closeDetail()"><i class="ph ph-x"></i></button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://exfdjelwyrspfspcevvm.supabase.co',
  'sb_publishable_6Yb2QjjK9jkDpvAeIZuOxA_g1KEA4ED'
);

// ── SIDEBAR ──
(function() {
  const ACTIVE = 'quotes';
  const groups = [
    { single:true, id:'overview', icon:'ph-squares-four', label:'מבט על', href:'admin-overview.html' },
    { id:'users-g', icon:'ph-users-three', label:'משתמשים', items:[
      { id:'users',   icon:'ph-users',       label:'אישור משתמשים', href:'admin-users.html' },
      { id:'members', icon:'ph-medal',        label:'חבר אלום',      href:'admin-members.html' },
      { id:'crm',     icon:'ph-address-book', label:'קהילה ו-CRM',  href:'approved-users.html' },
    ]},
    { id:'sales-g', icon:'ph-chart-line-up', label:'מכירות וכספים', items:[
      { id:'orders',    icon:'ph-list-bullets',           label:'הזמנות',        href:'admin.html' },
      { id:'quotes',    icon:'ph-file-text',              label:'הצעות מחיר',    href:'admin-quotes.html' },
      { id:'financial', icon:'ph-currency-circle-dollar', label:'ניהול פיננסי',  href:'admin-financial.html' },
      { id:'settings',  icon:'ph-gear-six',               label:'תמחור גלובלי', href:'admin-settings.html' },
    ]},
    { id:'ops-g', icon:'ph-wrench', label:'תפעול ולו"ז', items:[
      { id:'calendar', icon:'ph-calendar-dots', label:'לוח זמנים',    href:'admin-calendar.html' },
      { id:'tasks',    icon:'ph-check-square',  label:'ניהול משימות', href:'admin-tasks.html' },
    ]},
  ];
  const activeGroup = groups.find(g => !g.single && g.items && g.items.some(i => i.id === ACTIVE));
  let html = '<div class="sidebar-label">ניהול</div><ul class="admin-nav">';
  for (const g of groups) {
    if (g.single) {
      html += `<li><a href="${g.href}" class="${g.id===ACTIVE?'active':''}"><i class="ph ${g.icon}"></i> ${g.label}</a></li>`;
    } else {
      const open = !!(activeGroup && activeGroup.id === g.id);
      html += `<li><div class="nav-group-hdr${open?' open':''}" onclick="(function(h){var s=h.nextElementSibling,o=h.classList.contains('open');document.querySelectorAll('.nav-group-hdr.open').forEach(function(x){x.classList.remove('open');x.nextElementSibling.style.display='none';});if(!o){h.classList.add('open');s.style.display='flex';}})(this)"><span class="nav-grp-left"><i class="ph ${g.icon}"></i> ${g.label}</span><i class="ph ph-caret-down nav-caret"></i></div><ul class="nav-sub" style="display:${open?'flex':'none'}">${g.items.map(i=>`<li><a href="${i.href}" class="${i.id===ACTIVE?'active':''}"><i class="ph ${i.icon}"></i> ${i.label}</a></li>`).join('')}</ul></li>`;
    }
  }
  html += '</ul>';
  const el = document.getElementById('admin-sidebar-placeholder');
  if (el) el.innerHTML = html;
})();

let allQuotes = [];
let currentFilter = 'all';

// ── AUTH + ADMIN CHECK ──
async function init() {
  const { data: { user }, error: authErr } = await supabase.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }

  const { data: adminRow } = await supabase
    .from('admin_users').select('user_id').eq('user_id', user.id).maybeSingle();
  if (!adminRow) { window.location.href = 'login.html'; return; }

  document.getElementById('pageSubtitle').textContent = `מחובר כ-${user.email}`;
  await loadQuotes();
}

async function loadQuotes() {
  // Query 1: formal quotes table
  const { data: quotesData, error: quotesErr } = await supabase
    .from('quotes')
    .select('id, created_at, quote_code, status, subtotal, vat, total_amount, config, user_id, profiles!user_id(full_name, business_name, phone)')
    .order('created_at', { ascending: false });

  if (quotesErr) {
    showError(`שגיאה בטעינת הצעות (${quotesErr.code}): ${quotesErr.message}`);
    return;
  }

  // Query 2: orders table with status quote/draft (procurement orders) — no profiles JOIN to avoid RLS exclusion
  const { data: orderQuotes, error: ordersErr } = await supabase
    .from('orders')
    .select('id, created_at, order_code, status, subtotal, total_price, config, user_id, vendor_name, category, profiles!user_id(full_name, business_name, phone)')
    .in('status', ['quote', 'draft'])
    .order('created_at', { ascending: false });

  if (ordersErr) {
    showError(`שגיאה בטעינת הזמנות-הצעות (${ordersErr.code}): ${ordersErr.message}`);
    return;
  }

  // Normalize orders into the same shape as quotes
  const normalizedOrders = (orderQuotes || []).map(o => ({
    _source: 'order',
    id: o.id,
    created_at: o.created_at,
    quote_code: o.order_code,
    status: o.status,
    subtotal: o.subtotal || 0,
    vat: 0,
    total_amount: o.total_price || o.subtotal || 0,
    config: o.config,
    user_id: o.user_id,
    vendor_name: o.vendor_name,
    category: o.category,
    profiles: o.profiles || null,
  }));

  allQuotes = [...(quotesData || []), ...normalizedOrders]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  renderTable();
}

function showError(msg) {
  document.getElementById('pageSubtitle').innerHTML =
    `<span style="color:#dc2626;font-weight:700;"><i class="ph ph-warning"></i> ${msg}</span>`;
  document.getElementById('quotesTableBody').innerHTML =
    `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#dc2626;">${msg}</td></tr>`;
}

// ── FILTER ──
window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable();
};

// ── RENDER TABLE ──
function renderTable() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const rows = allQuotes.filter(q => {
    if (currentFilter !== 'all' && q.status !== currentFilter) return false;
    const name = (q.profiles?.full_name || q.vendor_name || '').toLowerCase();
    const code = (q.quote_code || q.id || '').toLowerCase();
    if (search && !code.includes(search) && !name.includes(search)) return false;
    return true;
  });

  document.getElementById('quotesCount').textContent =
    `מציג ${rows.length} מתוך ${allQuotes.length} הצעות מחיר`;

  const tbody = document.getElementById('quotesTableBody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ph ph-file-text"></i><p>אין הצעות מחיר</p></div></td></tr>`;
    return;
  }

  const statusLabel = { draft:'טיוטה', sent:'נשלח', approved:'אושר', rejected:'נדחה' };
  const statusClass = { draft:'status-draft', sent:'status-sent', approved:'status-approved', rejected:'status-rejected' };

  tbody.innerHTML = rows.map(q => {
    const d = new Date(q.created_at);
    const date = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    const code = q.quote_code || q.id?.slice(0,8) || '—';
    const name = q.profiles?.full_name || q.vendor_name || '—';
    const phone = q.profiles?.phone || '—';
    const total = q.total_amount ? `₪${Number(q.total_amount).toLocaleString()}` : '—';
    const st = q.status || 'draft';
    const badge = `<span class="status-badge ${statusClass[st] || ''}">${statusLabel[st] || st}</span>`;
    const sourceTag = q._source === 'order'
      ? `<span style="font-size:0.68rem;background:rgba(26,95,170,0.1);color:var(--electric-blue);border:1px solid rgba(26,95,170,0.2);padding:0.1rem 0.4rem;border-radius:10px;margin-right:0.3rem;">רכש</span>`
      : '';

    return `<tr>
      <td class="quote-code-cell">${sourceTag}${code}</td>
      <td><div style="font-weight:600">${name}</div><div style="font-size:0.78rem;color:var(--silver-dark)">${q.profiles?.business_name || q.category || ''}</div></td>
      <td style="font-size:0.82rem;color:var(--silver-dark)">${phone}</td>
      <td>${date}</td>
      <td class="price-cell">${total}</td>
      <td>
        <div>
          <select class="status-select" data-id="${q.id}" data-prev="${st}" onchange="updateStatus(this)">
            <option value="draft"    ${st==='draft'    ?'selected':''}>טיוטה</option>
            <option value="sent"     ${st==='sent'     ?'selected':''}>נשלח</option>
            <option value="approved" ${st==='approved' ?'selected':''}>אושר</option>
            <option value="rejected" ${st==='rejected' ?'selected':''}>נדחה</option>
          </select>
          <div class="save-indicator" id="si-${q.id}"></div>
        </div>
      </td>
      <td>
        <button class="filter-btn" style="padding:0.3rem 0.7rem;font-size:0.78rem;" onclick="openDetail('${q.id}')">
          <i class="ph ph-eye"></i> פרטים
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── UPDATE STATUS ──
window.updateStatus = async function(sel) {
  const id = sel.dataset.id;
  const newStatus = sel.value;
  const si = document.getElementById(`si-${id}`);
  sel.disabled = true;
  si.innerHTML = '<i class="ph ph-circle-notch" style="animation:spin 0.8s linear infinite;display:inline-block"></i>';

  const q = allQuotes.find(x => x.id === id);
  const tableName = q?._source === 'order' ? 'orders' : 'quotes';
  const { error } = await supabase.from(tableName)
    .update({ status: newStatus, updated_at: new Date().toISOString() })
    .eq('id', id);

  sel.disabled = false;
  if (error) {
    si.innerHTML = '<span class="save-err"><i class="ph ph-warning"></i> שגיאה</span>';
    sel.value = sel.dataset.prev;
  } else {
    si.innerHTML = '<span class="save-ok"><i class="ph ph-check"></i> נשמר</span>';
    if (q) q.status = newStatus;
    sel.dataset.prev = newStatus;
    setTimeout(() => { if(si) si.innerHTML = ''; }, 2000);
  }
};

// ── DETAIL PANEL ──
window.openDetail = function(id) {
  const q = allQuotes.find(x => x.id === id);
  if (!q) return;

  const code = q.quote_code || q.id?.slice(0,8) || '—';
  document.getElementById('detailTitle').textContent = `הצעה ${code}`;

  const cfg = q.config || {};
  const systems = Array.isArray(cfg.systems) ? cfg.systems : [];
  const isProcurement = cfg.type === 'procurement';

  let html = `<div class="detail-card">
    <div class="detail-card-title"><i class="ph ph-user"></i> פרטי לקוח</div>
    <div class="detail-grid">
      <div class="detail-item"><span class="detail-key">שם מלא</span><span class="detail-val">${q.profiles?.full_name || q.vendor_name || '—'}</span></div>
      <div class="detail-item"><span class="detail-key">שם עסק</span><span class="detail-val">${q.profiles?.business_name || q.category || '—'}</span></div>
      <div class="detail-item"><span class="detail-key">טלפון</span><span class="detail-val">${q.profiles?.phone || '—'}</span></div>
      <div class="detail-item"><span class="detail-key">קוד הצעה</span><span class="detail-val">${code}</span></div>
      <div class="detail-item"><span class="detail-key">תאריך</span><span class="detail-val">${new Date(q.created_at).toLocaleDateString('he-IL')}</span></div>
    </div>
  </div>`;

  // Procurement order — show profiles + screws tables
  if (isProcurement) {
    const profiles = cfg.profiles || [];
    const screws   = cfg.screws   || [];
    if (profiles.length > 0) {
      html += `<div class="detail-card">
        <div class="detail-card-title"><i class="ph ph-list-bullets"></i> פרופילי אלומיניום</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem;">
          <thead><tr style="background:#f7f9fd;">
            <th style="padding:5px 8px;font-weight:600;text-align:right;">מק"ט</th>
            <th style="padding:5px 8px;font-weight:600;text-align:right;">שם</th>
            <th style="padding:5px 8px;font-weight:600;text-align:center;">אורך (מ')</th>
            <th style="padding:5px 8px;font-weight:600;text-align:center;">כמות</th>
          </tr></thead><tbody>` +
          profiles.map((p, i) => `<tr style="border-top:1px solid #e8edf2;background:${i%2===0?'transparent':'#f8fafc'}">
            <td style="padding:5px 8px;color:var(--silver-dark)">${p.sku||'—'}</td>
            <td style="padding:5px 8px;">${p.name||'—'}</td>
            <td style="padding:5px 8px;text-align:center;">${p.len||6}</td>
            <td style="padding:5px 8px;text-align:center;">${p.qty||1}</td>
          </tr>`).join('') +
          `</tbody></table>
      </div>`;
    }
    if (screws.length > 0) {
      html += `<div class="detail-card">
        <div class="detail-card-title"><i class="ph ph-nut"></i> ברגים ועוגנים</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem;">
          <thead><tr style="background:#f7f9fd;">
            <th style="padding:5px 8px;font-weight:600;text-align:right;">מוצר</th>
            <th style="padding:5px 8px;font-weight:600;text-align:center;">כמות</th>
          </tr></thead><tbody>` +
          screws.map((s, i) => `<tr style="border-top:1px solid #e8edf2;background:${i%2===0?'transparent':'#f8fafc'}">
            <td style="padding:5px 8px;">${s.name||s.product||'—'}</td>
            <td style="padding:5px 8px;text-align:center;">${s.qty||1}</td>
          </tr>`).join('') +
          `</tbody></table>
      </div>`;
    }
  }

  if (systems.length > 0) {
    systems.forEach((s, i) => {
      const color = s.color ? (typeof s.color === 'object' ? s.color.name || JSON.stringify(s.color) : s.color) : '—';
      html += `<div class="detail-card">
        <div class="detail-card-title"><i class="ph ph-cube"></i> מערכת ${i+1}</div>
        <div class="config-section">
          <div class="config-row"><span class="config-key">מידות</span><span class="config-val">${s.width||'—'} × ${s.depth||'—'} ס"מ</span></div>
          <div class="config-row"><span class="config-key">גובה התקנה</span><span class="config-val">${s.installHeight||'—'} ס"מ</span></div>
          <div class="config-row"><span class="config-key">צבע</span><span class="config-val">${color}</span></div>
          ${s.pvcColor ? `<div class="config-row"><span class="config-key">צבע PVC</span><span class="config-val">${s.pvcColor}</span></div>` : ''}
        </div>
      </div>`;
    });
  }

  // Addons
  const addons = cfg.addons || {};
  const addonNames = { led:'תאורת לד', remote:'שלט רחוק', tahoma:'תאומה', dimmer:'דימר' };
  const activeAddons = Object.entries(addons).filter(([,v])=>v).map(([k])=>addonNames[k]||k);
  if (activeAddons.length > 0) {
    html += `<div class="detail-card">
      <div class="detail-card-title"><i class="ph ph-star"></i> תוספות</div>
      <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.3rem;">
        ${activeAddons.map(a=>`<span style="background:var(--blue-dim);color:var(--electric-blue);border:1px solid rgba(26,95,170,0.2);padding:0.2rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:600;">${a}</span>`).join('')}
      </div>
    </div>`;
  }

  // Totals
  html += `<div class="detail-card">
    <div class="detail-card-title"><i class="ph ph-receipt"></i> סיכום כספי</div>
    <div class="config-section">
      <div class="config-row"><span class="config-key">סכום לפני מע"מ</span><span class="config-val">₪${Number(q.subtotal||0).toLocaleString()}</span></div>
      <div class="config-row"><span class="config-key">מע"מ (18%)</span><span class="config-val">₪${Number(q.vat||0).toLocaleString()}</span></div>
    </div>
    <div class="grand-total"><span>סה"כ כולל מע"מ</span><span>₪${Number(q.total_amount||0).toLocaleString()}</span></div>
  </div>`;

  document.getElementById('detailBody').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
};

window.closeDetail = function(e) {
  if (!e || e.target === document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('open');
  }
};

window.handleLogout = async function() {
  await supabase.auth.signOut();
  window.location.href = 'login.html';
};

init();
</script>
</body>
</html>
