<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALUM-IL | קהילה ו-CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* ─── Layout ─── */
    .admin-wrapper { display:flex; flex:1; min-height:calc(100vh - 64px); }
    .admin-sidebar {
      width:220px; flex-shrink:0;
      background:var(--surface-dark);
      border-left:1px solid var(--border);
      padding:1.5rem 1rem;
    }
    .sidebar-label { font-size:0.72rem;font-weight:700;color:var(--silver-dark);text-transform:uppercase;letter-spacing:1px;padding:0 0.75rem;margin-bottom:0.75rem; }
    .admin-nav { list-style:none;display:flex;flex-direction:column;gap:0.15rem; }
    .admin-nav a {
      display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.75rem;border-radius:8px;
      font-size:0.9rem;font-weight:500;color:var(--silver-dark);text-decoration:none;
      transition:all 0.18s ease;
    }
    .admin-nav a:hover { background:var(--blue-dim);color:var(--electric-blue); }
    .admin-nav a.active { background:var(--blue-dim);color:var(--electric-blue);font-weight:700; }

    .admin-content { flex:1;padding:2rem 2.5rem;overflow-y:auto; }

    /* ─── Page Header ─── */
    .page-header { display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem; }
    .page-title { font-size:1.45rem;font-weight:800;color:var(--industrial-silver);line-height:1.2; }
    .page-subtitle { color:var(--silver-dark);font-size:0.88rem;margin-top:0.2rem; }
    .stat-pills { display:flex;gap:0.6rem;flex-wrap:wrap; }
    .stat-pill {
      display:flex;align-items:center;gap:0.4rem;
      padding:0.3rem 0.85rem;border-radius:20px;
      font-size:0.78rem;font-weight:700;
      background:var(--surface-dark);border:1px solid var(--border);
      color:var(--silver-dark);
    }
    .stat-pill .pill-num { font-size:1rem;font-weight:800;color:var(--industrial-silver); }

    /* ─── Toolbar ─── */
    .toolbar {
      display:flex;align-items:center;gap:0.6rem;margin-bottom:1.25rem;flex-wrap:wrap;
    }
    .search-wrap { position:relative;flex:1;min-width:200px; }
    .search-wrap i { position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);color:var(--silver-dark);pointer-events:none;font-size:1rem; }
    .search-input {
      width:100%;padding:0.5rem 2.2rem 0.5rem 1rem;
      border:1.5px solid var(--border);border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:0.88rem;color:var(--industrial-silver);
      background:var(--surface-dark);
    }
    .search-input:focus { outline:none;border-color:var(--electric-blue); }
    .filter-select {
      padding:0.48rem 0.9rem;border:1.5px solid var(--border);border-radius:9px;
      font-family:'Heebo',sans-serif;font-size:0.85rem;color:var(--industrial-silver);
      background:var(--surface-dark);cursor:pointer;min-width:140px;
    }
    .filter-select:focus { outline:none;border-color:var(--electric-blue); }
    .count-badge {
      margin-right:auto;padding:0.3rem 0.8rem;border-radius:20px;
      font-size:0.78rem;font-weight:700;color:var(--electric-blue);
      background:var(--blue-dim);border:1px solid rgba(26,95,170,0.2);
      white-space:nowrap;
    }

    /* ─── Table ─── */
    .crm-table-wrap { overflow-x:auto;border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.04); }
    .crm-table { width:100%;border-collapse:collapse;font-size:0.86rem; }
    .crm-table thead tr { background:linear-gradient(to left,#f4f7fb,#eef2f8); }
    .crm-table th {
      padding:0.75rem 1rem;
      text-align:right;font-size:0.69rem;font-weight:800;color:var(--silver-dark);
      text-transform:uppercase;letter-spacing:0.6px;border-bottom:1.5px solid var(--border);
      white-space:nowrap;
    }
    .crm-table td { padding:0.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle; }
    .crm-table tbody tr:last-child > td { border-bottom:none; }
    .crm-table tbody tr.data-row:hover > td { background:rgba(26,95,170,0.03);cursor:pointer; }
    .crm-table tbody tr.data-row.is-expanded > td { background:rgba(26,95,170,0.05); }
    .crm-table tbody tr.data-row.member-gold > td { background:rgba(212,175,55,0.07); }
    .crm-table tbody tr.data-row.member-gold:hover > td { background:rgba(212,175,55,0.13); }
    .crm-table tbody tr.data-row.member-gold.is-expanded > td { background:rgba(212,175,55,0.11); }
    .crm-table tbody tr.data-row.member-gold { box-shadow:inset 3px 0 0 #d4af37; }

    /* ─── Business name cell ─── */
    .biz-cell .biz-name { font-weight:700;font-size:0.92rem;color:var(--industrial-silver); }
    .biz-cell .biz-meta { display:flex;align-items:center;gap:0.4rem;margin-top:0.2rem;flex-wrap:wrap; }
    .biz-cell .join-date { font-size:0.73rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.2rem; }
    .biz-cell .full-name { font-size:0.75rem;color:var(--silver-dark); }
    .biz-cell .biz-contact { font-size:0.73rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;margin-top:0.15rem; }
    .spec-check-wrap { display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.35rem; }
    .spec-ck { display:inline-flex;align-items:center;gap:0.3rem;font-size:0.82rem;cursor:pointer;color:var(--industrial-silver); }
    .spec-ck input { cursor:pointer; }

    /* ─── Tag badges ─── */
    .badge-wrap { display:flex;flex-wrap:wrap;gap:0.22rem; }
    .badge {
      display:inline-flex;align-items:center;
      padding:0.13rem 0.52rem;border-radius:20px;
      font-size:0.7rem;font-weight:700;white-space:nowrap;
    }
    /* Professional type — electric blue */
    .badge-type {
      background:rgba(26,95,170,0.09);color:#1a5faa;
      border:1px solid rgba(26,95,170,0.2);
    }
    /* Specialties — per-type colors */
    .badge-spec-pergolas          { background:rgba(22,163,74,0.1);   color:#16a34a; border:1px solid rgba(22,163,74,0.25); }
    .badge-spec-electric-pergolas { background:rgba(124,58,237,0.1);  color:#7c3aed; border:1px solid rgba(124,58,237,0.25); }
    .badge-spec-zip-screens       { background:rgba(234,88,12,0.1);   color:#ea580c; border:1px solid rgba(234,88,12,0.25); }
    .badge-spec-windows-shutters  { background:rgba(3,105,161,0.1);   color:#0369a1; border:1px solid rgba(3,105,161,0.25); }
    .badge-spec-gates-fences      { background:rgba(185,28,28,0.1);   color:#b91c1c; border:1px solid rgba(185,28,28,0.25); }
    .badge-spec-curtain-walls     { background:rgba(21,101,192,0.1);  color:#1565c0; border:1px solid rgba(21,101,192,0.25); }
    .badge-spec-doors-cladding    { background:rgba(136,14,79,0.1);   color:#880e4f; border:1px solid rgba(136,14,79,0.25); }
    .badge-spec-service-repairs   { background:rgba(106,27,154,0.1);  color:#6a1b9a; border:1px solid rgba(106,27,154,0.25); }
    /* Regions — amber */
    .badge-region {
      background:rgba(217,119,6,0.09);color:#b45309;
      border:1px solid rgba(217,119,6,0.22);
    }

    /* ─── Quotes count ─── */
    .quotes-cell { text-align:center; }
    .quotes-num {
      display:inline-flex;align-items:center;justify-content:center;
      width:36px;height:36px;border-radius:50%;
      font-size:0.88rem;font-weight:800;
      background:var(--blue-dim);color:var(--electric-blue);
      border:1.5px solid rgba(26,95,170,0.18);
    }
    .quotes-num.zero { background:rgba(100,100,100,0.06);color:var(--silver-dark);border-color:var(--border); }

    /* ─── Actions column ─── */
    .actions-cell { display:flex;gap:0.4rem;align-items:center; }
    .btn-wa {
      display:inline-flex;align-items:center;gap:0.25rem;
      padding:0.3rem 0.7rem;border:none;border-radius:7px;
      font-family:'Heebo',sans-serif;font-size:0.77rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;text-decoration:none;
      background:rgba(37,211,102,0.1);color:#128C7E;
      border:1.5px solid rgba(37,211,102,0.28);white-space:nowrap;
    }
    .btn-wa:hover { background:rgba(37,211,102,0.2); }
    .btn-expand {
      display:inline-flex;align-items:center;justify-content:center;
      width:30px;height:30px;border:1.5px solid var(--border);border-radius:7px;
      background:var(--surface-dark);color:var(--silver-dark);
      cursor:pointer;transition:all 0.18s ease;font-size:1rem;
    }
    .btn-expand:hover { border-color:var(--electric-blue);color:var(--electric-blue); }
    .btn-expand.open { border-color:var(--electric-blue);color:var(--electric-blue);background:var(--blue-dim); }

    /* ─── Expand panel v2 ─── */
    .expand-row td { padding:0; border-bottom:2px solid var(--electric-blue); background:var(--surface-dark); }
    .expand-panel { display:flex; flex-direction:column; }
    .ep-section { padding:1.25rem 1.75rem; border-bottom:1px solid var(--border); }
    .ep-section:last-of-type { border-bottom:none; }
    .ep-section-title {
      display:flex; align-items:center; gap:0.45rem;
      font-size:0.7rem; font-weight:800; text-transform:uppercase;
      letter-spacing:0.8px; color:var(--silver-dark); margin-bottom:1rem;
    }
    .ep-pin-note { font-size:0.62rem; font-weight:400; opacity:0.65; margin-right:0.5rem; }

    /* Info grid (section 1) */
    .ep-info-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.85rem 1.5rem; }
    .ep-info-item { display:flex; flex-direction:column; gap:0.18rem; }
    .ep-info-label { font-size:0.62rem; font-weight:700; color:var(--silver-dark); text-transform:uppercase; letter-spacing:0.4px; }
    .ep-info-val { font-size:0.9rem; font-weight:600; color:var(--industrial-silver); }

    /* Stats row (section 2) */
    .ep-stats-row { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:0.9rem; }
    .ep-stat-box {
      flex:1; min-width:90px; padding:0.7rem 0.9rem; border-radius:10px;
      background:rgba(100,100,100,0.05); border:1px solid var(--border); text-align:center;
    }
    .ep-stat-box--blue { background:var(--blue-dim); border-color:rgba(26,95,170,0.2); }
    .ep-stat-box--green { background:rgba(22,163,74,0.06); border-color:rgba(22,163,74,0.22); }
    .ep-stat-num { font-size:1.15rem; font-weight:800; color:var(--industrial-silver); }
    .ep-stat-num--sm { font-size:0.78rem !important; }
    .ep-stat-lbl { font-size:0.67rem; font-weight:600; color:var(--silver-dark); margin-top:0.2rem; }
    .btn-history {
      display:inline-flex; align-items:center; gap:0.4rem;
      padding:0.38rem 0.95rem; border-radius:8px;
      font-size:0.8rem; font-weight:700;
      color:var(--electric-blue); background:var(--blue-dim);
      border:1.5px solid rgba(26,95,170,0.2); text-decoration:none; transition:all 0.18s;
    }
    .btn-history:hover { background:rgba(26,95,170,0.15); }

    /* Admin settings (section 3) */
    .ep-admin-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1rem; }
    .ep-field label {
      display:block; font-size:0.68rem; font-weight:800; color:var(--silver-dark);
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.35rem;
    }
    .ep-field input[type="text"],
    .ep-field input[type="date"],
    .ep-field select,
    .ep-field textarea {
      width:100%; padding:0.42rem 0.8rem;
      border:1.5px solid var(--border); border-radius:8px;
      font-family:'Heebo',sans-serif; font-size:0.88rem; color:var(--industrial-silver);
      background:var(--surface-dark); resize:vertical;
    }
    .ep-field input:focus, .ep-field select:focus, .ep-field textarea:focus {
      outline:none; border-color:var(--electric-blue);
    }
    .ep-admin-grid input[type="date"],
    .ep-admin-grid select {
      width:100%; padding:0.42rem 0.8rem;
      border:1.5px solid var(--border); border-radius:8px;
      font-family:'Heebo',sans-serif; font-size:0.88rem; color:var(--industrial-silver);
      background:var(--surface-dark);
    }
    .ep-admin-grid input:focus, .ep-admin-grid select:focus { outline:none; border-color:var(--electric-blue); }
    .spec-check-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; }
    .spec-ck {
      display:inline-flex; align-items:center; gap:0.35rem;
      padding:0.28rem 0.65rem; border-radius:20px; cursor:pointer;
      font-size:0.76rem; font-weight:600;
      border:1.5px solid var(--border); background:rgba(100,100,100,0.04);
      transition:all 0.15s; user-select:none;
    }
    .spec-ck input { display:none; }
    .spec-ck:has(input:checked) { background:var(--blue-dim); border-color:rgba(26,95,170,0.3); color:var(--electric-blue); }

    /* Notes (section 4) */
    .notes-log {
      background:rgba(100,100,100,0.04); border:1px solid var(--border); border-radius:8px;
      padding:0.7rem 1rem; font-size:0.82rem; color:var(--silver-dark);
      white-space:pre-wrap; max-height:110px; overflow-y:auto;
      margin-bottom:0.65rem; direction:rtl; text-align:right;
      font-family:'Heebo',sans-serif; line-height:1.6;
    }
    .notes-log-empty { color:rgba(150,150,150,0.5); font-style:italic; font-size:0.75rem; }
    .new-note-input {
      width:100%; padding:0.45rem 0.85rem;
      border:1.5px solid var(--border); border-radius:8px;
      font-family:'Heebo',sans-serif; font-size:0.88rem;
      color:var(--industrial-silver); background:var(--surface-dark);
      resize:vertical;
    }
    .new-note-input:focus { outline:none; border-color:var(--electric-blue); }

    /* Actions bar */
    .ep-actions {
      display:flex; align-items:center; justify-content:flex-end; gap:0.6rem;
      padding:0.9rem 1.75rem; background:rgba(248,250,255,0.04);
      border-top:1px solid var(--border);
    }
    .btn-save-crm {
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.4rem 1.15rem;border:none;border-radius:8px;
      font-family:'Heebo',sans-serif;font-size:0.84rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;
      background:var(--electric-blue);color:#fff;
    }
    .btn-save-crm:hover { opacity:0.88; }
    .btn-save-crm:disabled { opacity:0.4;pointer-events:none; }
    .blocked-badge { display:inline-flex;align-items:center;gap:0.25rem;padding:0.18rem 0.6rem;border-radius:20px;font-size:0.71rem;font-weight:700;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25); }
    .btn-block { display:inline-flex;align-items:center;gap:0.3rem;padding:0.38rem 0.9rem;border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;border:1.5px solid rgba(220,38,38,0.3);background:rgba(220,38,38,0.07);color:#dc2626;transition:all 0.18s; }
    .btn-block:hover { background:rgba(220,38,38,0.15); }
    .btn-unblock { border-color:rgba(22,163,74,0.3) !important;background:rgba(22,163,74,0.07) !important;color:#16a34a !important; }
    .btn-unblock:hover { background:rgba(22,163,74,0.15) !important; }
    .btn-delete-user { display:inline-flex;align-items:center;gap:0.3rem;padding:0.38rem 0.9rem;border-radius:8px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;border:1.5px solid rgba(220,38,38,0.5);background:transparent;color:#dc2626;transition:all 0.18s; }
    .btn-delete-user:hover { background:rgba(220,38,38,0.1); }
    .save-ok { font-size:0.8rem;color:#16a34a;font-weight:700;display:none;align-items:center;gap:0.3rem; }

    /* ─── Stars ─── */
    .star-row { display:flex;gap:0.15rem;cursor:pointer; }
    .star-btn { font-size:1.3rem;color:var(--border);transition:color 0.12s;cursor:pointer;background:none;border:none;padding:0; }
    .star-btn.lit { color:#f59e0b; }
    .star-btn:hover { color:#f59e0b; }

    /* ─── Sub badge ─── */
    .sub-pill {
      display:inline-flex;align-items:center;gap:0.25rem;
      padding:0.18rem 0.6rem;border-radius:20px;font-size:0.71rem;font-weight:700;white-space:nowrap;
    }
    .sub-trial   { background:rgba(22,163,74,0.1);color:#16a34a;border:1px solid rgba(22,163,74,0.22); }
    .sub-active  { background:rgba(26,95,170,0.1);color:#1a5faa;border:1px solid rgba(26,95,170,0.2); }
    .sub-expired { background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.2); }
    .sub-none    { background:rgba(100,100,100,0.07);color:var(--silver-dark);border:1px solid var(--border); }

    /* ─── Tier toggle ─── */
    .tier-toggle { display:flex;gap:0.3rem;background:var(--surface-dark);border:1.5px solid var(--border);border-radius:10px;padding:0.25rem; }
    .tier-btn {
      display:inline-flex;align-items:center;gap:0.4rem;
      padding:0.32rem 0.9rem;border-radius:7px;border:none;
      font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;
      cursor:pointer;transition:all 0.18s ease;
      background:transparent;color:var(--silver-dark);
    }
    .tier-btn.active-all  { background:var(--blue-dim);color:var(--electric-blue); }
    .tier-btn.active-members { background:rgba(212,175,55,0.15);color:#d4af37; }

    /* ─── Empty / loading ─── */
    .empty-state { text-align:center;padding:4rem 2rem;color:var(--silver-dark); }
    .empty-state i { font-size:2.5rem;opacity:0.25;display:block;margin-bottom:0.75rem; }
    .empty-state p { font-size:0.92rem;font-weight:600; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite;display:inline-block; }
  </style>
</head>
<body>
  <header style="position:relative;border-bottom:1px solid var(--border);background:var(--surface-dark);padding:0.85rem 2rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.6rem;">
      <img src="logo.PNG" alt="ALUM-IL" style="height:36px;">
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.78rem;background:rgba(220,38,38,0.1);color:#dc2626;border:1px solid rgba(220,38,38,0.25);padding:0.2rem 0.65rem;border-radius:20px;font-weight:700;">
        <i class="ph ph-shield-star"></i> פאנל ניהול
      </span>
      <a href="dashboard.html" style="font-size:0.85rem;color:var(--silver-dark);display:flex;align-items:center;gap:0.3rem;">
        <i class="ph ph-arrow-right"></i> אזור אישי
      </a>
    </div>
  </header>

  <div class="admin-wrapper">
    <aside class="admin-sidebar">
      <div id="admin-sidebar-placeholder"></div>
    </aside>

    <main class="admin-content">
      <div class="page-header">
        <div>
          <div class="page-title">קהילה ו-CRM</div>
          <div class="page-subtitle">כלל המשתמשים המאושרים — ניהול, מעקב ותקשורת</div>
        </div>
        <div class="stat-pills" id="statPills">
          <div class="stat-pill"><span class="pill-num" id="statTotal">—</span> סה"כ חברים</div>
          <div class="stat-pill"><span class="pill-num" id="statActive">—</span> מנויים פעילים</div>
          <div class="stat-pill"><span class="pill-num" id="statQuotes">—</span> הצעות מחיר</div>
        </div>
      </div>

      <div style="margin-bottom:1rem;">
        <div class="tier-toggle">
          <button class="tier-btn active-all" id="tierAll" onclick="setTierFilter('all')">
            <i class="ph ph-users-three"></i> הכל
          </button>
          <button class="tier-btn" id="tierStandard" onclick="setTierFilter('standard')">
            <i class="ph ph-user"></i> מתקינים
          </button>
          <button class="tier-btn" id="tierMembers" onclick="setTierFilter('members')">
            <i class="ph ph-medal"></i> חברי אלום
          </button>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <i class="ph ph-magnifying-glass"></i>
          <input class="search-input" type="text" id="searchInput"
            placeholder="חיפוש לפי שם, עסק, טלפון..."
            oninput="applyFilters()">
        </div>
        <select class="filter-select" id="filterRegion" onchange="applyFilters()">
          <option value="">כל אזורי הפעילות</option>
          <option value="north">צפון</option>

/* ── Helpers ── */
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  try { const p = JSON.parse(v); if (Array.isArray(p)) return p; } catch {}
  return [v];
}
function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('he-IL');
}
function waLink(phone) {
  if (!phone) return null;
  const digits = phone.replace(/\D/g, '');
  const intl = digits.startsWith('972') ? digits : '972' + digits.replace(/^0/, '');
  return `https://wa.me/${intl}`;
}

window.setTierFilter = function(tier) {
  currentTierFilter = tier;

  document.getElementById('tierStandard').className = 'tier-btn' + (tier === 'standard' ? ' active-all'     : '');
  document.getElementById('tierMembers').className  = 'tier-btn' + (tier === 'members'  ? ' active-members' : '');
  applyFilters();
};

/* ── Init ── */
async function init() {
  const user = await requireAdmin();
  if (!user) return;
  await loadUsers();
}

/* ── Fetch ── */
async function loadUsers() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .or('is_approved.eq.true,member_requested_at.not.is.null')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('crmBody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#dc2626;">שגיאה: ${error.message}</td></tr>`;
    return;
  }

  allUsers = data || [];
  updateStats();
  applyFilters();
}

/* ── Stats header ── */
function updateStats() {
  document.getElementById('statTotal').textContent = allUsers.length;
  const activeCount = allUsers.filter(u => ['trial','active'].includes(u.subscription_status)).length;
  document.getElementById('statActive').textContent = activeCount;
  const totalQ = allUsers.reduce((s, u) => s + (u.total_quotes_count || 0), 0);
  document.getElementById('statQuotes').textContent = totalQ;
}

/* ── Filter ── */
window.applyFilters = function() {
  const q      = (document.getElementById('searchInput').value || '').toLowerCase();
  const region = document.getElementById('filterRegion').value;
  const type   = document.getElementById('filterType').value;
  const spec   = document.getElementById('filterSpec').value;

  const filtered = allUsers.filter(u => {
    if (currentTierFilter === 'members'  && u.user_tier !== 'member') return false;
    if (currentTierFilter === 'standard' && u.user_tier === 'member') return false;
    if (q) {
      const hay = `${u.business_name||''} ${u.full_name||''} ${u.phone||''} ${u.business_id||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (region) {
      const regions = toArr(u.regions);
      if (!regions.includes(region)) return false;
    }
    if (type) {
      const types = toArr(u.user_type);
      if (!types.includes(type)) return false;
    }
    if (spec) {
      const specs = toArr(u.specialties);
      if (!specs.includes(spec)) return false;
    }
    return true;
  });

  const label = currentTierFilter === 'members' ? 'חברי אלום' : currentTierFilter === 'standard' ? 'מתקינים' : 'סה"כ';
  document.getElementById('countBadge').textContent = `${filtered.length} ${label}`;
  renderTable(filtered);
};

/* ── Render ── */
function renderTable(users) {
  const tbody = document.getElementById('crmBody');

  if (users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">

        <p>לא נמצאו חברים התואמים את הסינון</p>
      </div>
    </td></tr>`;
    return;
  }

  const rows = [];
  users.forEach(u => {
    try {
      rows.push(buildMainRow(u));
      if (expandedId === u.id) rows.push(buildExpandRow(u));
    } catch(err) {
      console.error('[CRM] row render error', u?.id, err);
    }
  });
  tbody.innerHTML = rows.join('');
}

              <div class="ep-label" style="font-size:0.7rem;color:var(--silver-dark);margin-bottom:0.5rem;"><i class="ph ph-star"></i> דירוג פנימי</div>
              <div class="star-row" id="stars-${u.id}">${stars}</div>
              <input type="hidden" id="rating-${u.id}" value="${rating}">
            </div>
          </div>
          <div class="ep-label" style="font-size:0.7rem;color:var(--silver-dark);margin-bottom:0.6rem;margin-top:0.75rem;display:flex;align-items:center;gap:0.35rem;"><i class="ph ph-graduation-cap"></i> תחומי התמחות</div>
          <div class="spec-check-wrap">
            ${Object.entries(SPEC_LABELS).map(([k, lbl]) =>
              `<label class="spec-ck"><input type="checkbox" name="spec-${u.id}" value="${k}"${expertArr.includes(k) ? ' checked' : ''}><span>${lbl}</span></label>`
            ).join('')}
          </div>
        </div>

        <!-- Section 4: היסטוריית שינויי פרטים (מתקפל) -->
        ${(() => {
          const crLogs = (u.member_activity_log || [])
            .filter(e => e.action === 'change_request_approved' || e.action === 'change_request_rejected')
            .slice().reverse();
          if (!crLogs.length) return '';
          return `<div class="ep-section">
            <div class="ep-section-title" onclick="toggleCrLog('${u.id}')" style="cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;">
              <span><i class="ph ph-clock-counter-clockwise"></i> היסטוריית שינויי פרטים
                <span style="font-size:0.72rem;font-weight:400;color:var(--silver-dark);margin-right:0.4rem;">(${crLogs.length})</span>
              </span>
              <i class="ph ph-caret-down" id="cr-log-caret-${u.id}" style="transition:transform 0.2s;font-size:0.9rem;color:var(--silver-dark);"></i>
            </div>
            <div id="cr-log-body-${u.id}" style="display:none;margin-top:0.6rem;display:none;">
              <div style="display:flex;flex-direction:column;gap:0.5rem;">
                ${crLogs.map(e => {
                  const approved = e.action === 'change_request_approved';
                  const date = new Date(e.at).toLocaleDateString('he-IL');
                  const time = new Date(e.at).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
                  return `<div style="padding:0.65rem 0.85rem;border-radius:8px;border:1px solid ${approved?'rgba(22,163,74,0.2)':'rgba(220,38,38,0.2)'};background:${approved?'rgba(22,163,74,0.05)':'rgba(220,38,38,0.05)'};">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">
                      <span style="font-size:0.72rem;font-weight:700;padding:0.1rem 0.5rem;border-radius:20px;
                        background:${approved?'rgba(22,163,74,0.12)':'rgba(220,38,38,0.1)'};
                        color:${approved?'#16a34a':'#dc2626'};">
                        ${approved?'✓ אושר':'✗ נדחה'}
                      </span>
                      <span style="font-size:0.75rem;color:var(--silver-dark);">${date} · ${time}</span>
                    </div>
                    <div style="font-size:0.8rem;color:var(--industrial-silver);white-space:pre-line;margin-bottom:${e.admin_note?'0.3rem':'0'};">${e.details || ''}</div>
                    ${e.admin_note ? `<div style="font-size:0.76rem;color:var(--silver-dark);"><i class="ph ph-note"></i> הערת אדמין: ${e.admin_note}</div>` : ''}
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>`;
        })()}

        <!-- Section 5: הערות פנימיות -->
        <div class="ep-section" style="border-bottom:none;">
          <div class="ep-section-title">
            <i class="ph ph-note-pencil"></i> הערות פנימיות
            <span style="font-size:0.68rem;color:var(--silver-dark);font-weight:400;text-transform:none;letter-spacing:0;"><i class="ph ph-lock-key"></i> מחיקה מוגנת קוד 1503</span>
          </div>
          <div class="notes-log" id="notes-log-${u.id}">${notesLogHtml}</div>
          <div style="margin-top:0.75rem;">
            <div style="font-size:0.7rem;color:var(--silver-dark);margin-bottom:0.4rem;display:flex;align-items:center;gap:0.3rem;"><i class="ph ph-plus-circle"></i> הוסף הערה חדשה</div>
            <textarea class="new-note-input" id="new-note-${u.id}" rows="2" placeholder="כתוב הערה חדשה..."></textarea>
          </div>
        </div>

        <div class="ep-actions">
          <span class="save-ok" id="save-ok-${u.id}"><i class="ph ph-check-circle"></i> נשמר בהצלחה</span>
          <button class="btn-block${u.is_blocked ? ' btn-unblock' : ''}" onclick="toggleBlock('${u.id}', ${!!u.is_blocked})">
            <i class="ph ph-${u.is_blocked ? 'lock-open' : 'prohibit'}"></i>
            ${u.is_blocked ? 'בטל חסימה' : 'חסום משתמש'}
          </button>
          <button class="btn-delete-user" onclick="deleteUser('${u.id}')">
            <i class="ph ph-trash"></i> מחק משתמש
          </button>
          <button class="btn-save-crm" id="save-btn-${u.id}" onclick="saveUser('${u.id}')">
            <i class="ph ph-floppy-disk"></i> שמור שינויים
          </button>
        </div>

      </div>
    </td>
  </tr>`;
}

/* ── Star rating (immediate save) ── */
window.setRating = async function(id, n) {
  document.getElementById(`rating-${id}`).value = n;
  const container = document.getElementById(`stars-${id}`);
  if (!container) return;
  container.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('lit', parseInt(btn.dataset.n) <= n);
  });
  await supabase.from('profiles').update({ rating: n }).eq('id', id);
  const idx = allUsers.findIndex(u => u.id === id);
  if (idx !== -1) allUsers[idx].rating = n;
};

/* ── Toggle change-log accordion ── */
window.toggleCrLog = function(id) {
  const body  = document.getElementById(`cr-log-body-${id}`);
  const caret = document.getElementById(`cr-log-caret-${id}`);
  if (!body) return;
  const open = body.style.display === 'none' || body.style.display === '';
  body.style.display  = open ? 'block' : 'none';
  if (caret) caret.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
};

/* ── Toggle expand ── */
window.toggleExpand = function(id) {
  expandedId = (expandedId === id) ? null : id;
  applyFilters();
  if (expandedId) {
    requestAnimationFrame(() => {
      document.getElementById(`expand-${expandedId}`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
    });
  }
};

/* ── Save ── */
window.saveUser = async function(id) {
  const btn = document.getElementById(`save-btn-${id}`);
  btn.disabled = true;
  btn.innerHTML = '<i class="ph ph-circle-notch spin"></i> שומר...';

  /* existing notes from local cache */
  const userIdx    = allUsers.findIndex(u => u.id === id);
  const existingNotes = (userIdx !== -1 ? allUsers[userIdx].internal_notes : '') || '';

  /* new note to append */
  const newNoteEl  = document.getElementById(`new-note-${id}`);
  const newNoteRaw = newNoteEl?.value?.trim() || '';

  let notes = existingNotes;
  if (newNoteRaw) {
    const now = new Date();
    const ts = `[${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}] `;
    const newLine = ts + newNoteRaw;
    notes = existingNotes ? existingNotes + '\n' + newLine : newLine;
  }

  const subSt  = document.getElementById(`sub-${id}`)?.value    ?? '';
  const expiry = document.getElementById(`expiry-${id}`)?.value ?? null;
  const rating = parseInt(document.getElementById(`rating-${id}`)?.value) || null;
  const specialties = Array.from(
    document.querySelectorAll(`input[name="spec-${id}"]:checked`)
  ).map(el => el.value);

  const payload = { internal_notes: notes, specialties };
  if (subSt)  payload.subscription_status  = subSt;
  if (expiry) payload.subscription_expiry  = expiry;
  if (rating) payload.rating = rating;

  const { error } = await supabase.from('profiles').update(payload).eq('id', id);

  if (error) {
    console.error('[CRM] save error:', error);
    alert('שגיאה בשמירה: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="ph ph-floppy-disk"></i> שמור שינויים';
    return;
  }

  /* update local cache */
  if (userIdx !== -1) {
    Object.assign(allUsers[userIdx], {
      internal_notes: notes,
      specialties,
      subscription_status: subSt || allUsers[userIdx].subscription_status,
      subscription_expiry: expiry || allUsers[userIdx].subscription_expiry,
      rating: rating || allUsers[userIdx].rating,
    });
  }

  /* update notes log in DOM + clear new-note field */
  if (newNoteEl) newNoteEl.value = '';
  const logEl = document.getElementById(`notes-log-${id}`);
  if (logEl) {
    logEl.innerHTML = notes
      ? notes.replace(/</g,'&lt;').replace(/\n/g,'<br>')
      : '<span class="notes-log-empty">אין הערות עדיין</span>';
  }

  updateStats();
  const ok = document.getElementById(`save-ok-${id}`);
  if (ok) { ok.style.display = 'flex'; setTimeout(() => { ok.style.display = 'none'; }, 2500); }
  btn.disabled = false;
  btn.innerHTML = '<i class="ph ph-floppy-disk"></i> שמור שינויים';
};

/* ── Block / Unblock ── */
window.toggleBlock = async function(id, isBlocked) {
  const code = prompt(isBlocked ? 'קוד לביטול חסימה:' : 'קוד לחסימת משתמש:');
  if (code !== 'ALUM2026') { if (code !== null) alert('קוד שגוי'); return; }
  const reason = !isBlocked ? (prompt('סיבת החסימה (אופציונלי):') || '') : null;
  const { error } = await supabase.from('profiles').update({
    is_blocked: !isBlocked,
    blocked_reason: reason
  }).eq('id', id);
  if (error) { alert('שגיאה: ' + error.message); return; }
  const idx = allUsers.findIndex(u => u.id === id);
  if (idx !== -1) { allUsers[idx].is_blocked = !isBlocked; allUsers[idx].blocked_reason = reason; }
  applyFilters();
};

/* ── Delete user ── */
window.deleteUser = async function(id) {
  const code = prompt('קוד אדמין למחיקת משתמש:');
  if (code !== 'ALUM2026') { if (code !== null) alert('קוד שגוי'); return; }
  const confirmTxt = prompt('כתוב "מחק" לאישור סופי:');
  if (confirmTxt !== 'מחק') return;
  const { error } = await supabase.from('profiles').delete().eq('id', id);
  if (error) { alert('שגיאה: ' + error.message); return; }
  allUsers = allUsers.filter(u => u.id !== id);
  expandedId = null;
  applyFilters();
};

/* ── חבר אלום ── */
window.setMemberTier = async function(userId, tier) {
  const update = { user_tier: tier };
  if (tier === 'member') update.member_approved_at = new Date().toISOString();
  const { error } = await supabase.from('profiles').update(update).eq('id', userId);
  if (error) { alert('שגיאה: ' + error.message); return; }
  const idx = allUsers.findIndex(u => u.id === userId);
  if (idx !== -1) Object.assign(allUsers[idx], update);
  applyFilters();
};

window.saveCertifications = async function(userId) {
  const checked = [...document.querySelectorAll(`input[data-uid="${userId}"][data-cert]:checked`)]
    .map(el => el.dataset.cert);
  const { error } = await supabase.from('profiles').update({ certifications: checked }).eq('id', userId);
  if (error) { alert('שגיאה בשמירת הסמכות: ' + error.message); return; }
  const idx = allUsers.findIndex(u => u.id === userId);
  if (idx !== -1) allUsers[idx].certifications = checked;
};

init();
</script>
</body>
</html>
